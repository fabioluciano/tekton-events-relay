name: PR Helm Validation

on:
  workflow_call:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "charts/**"
      - "docs/examples/**"
      - ".kube-linter.yaml"
      - ".kubeconform.yaml"
      - ".github/workflows/ci-helm.yaml"

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  helm-lint:
    name: Helm Lint & Template
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3
        with:
          submodules: true

      - name: Install Helm
        uses: azure/setup-helm@v5.0.0
        with:
          version: "v3.16.3"

      - name: Install helm-docs
        run: |
          curl -sSL https://github.com/norwoodj/helm-docs/releases/download/v1.14.2/helm-docs_1.14.2_Linux_x86_64.tar.gz | tar xz
          sudo mv helm-docs /usr/local/bin/

      - name: Generate Helm documentation
        run: |
          echo "::group::Helm docs generation"
          helm-docs --chart-search-root=charts
          echo "::endgroup::"

      - name: Check if documentation is up to date
        run: |
          if [ -n "$(git status --porcelain charts/tekton-events-relay/README.md)" ]; then
            echo "::error::Helm documentation is out of date. Please run 'mise run helm-docs' locally and commit the changes."
            git diff charts/tekton-events-relay/README.md
            exit 1
          fi

      - name: Helm lint
        run: |
          echo "::group::Helm lint"
          helm lint charts/tekton-events-relay
          echo "::endgroup::"

      - name: Validate values.schema.json syntax
        run: |
          echo "::group::Schema JSON syntax"
          jq empty charts/tekton-events-relay/values.schema.json
          echo "::endgroup::"

      - name: Helm schema validation (strict)
        run: |
          echo "::group::Helm schema strict validation"
          helm lint charts/tekton-events-relay --strict -f charts/tekton-events-relay/values.yaml
          echo "::endgroup::"

      - name: Helm template (dry-run)
        run: |
          echo "::group::Helm template rendering"
          helm template tekton-events-relay charts/tekton-events-relay --debug
          echo "::endgroup::"

  schema-validation:
    name: Kubernetes Schema Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3
        with:
          submodules: true

      - name: Install Helm
        uses: azure/setup-helm@v5.0.0
        with:
          version: "v3.16.3"

      - name: Install kubeconform
        run: |
          curl -L https://github.com/yannh/kubeconform/releases/download/v0.7.0/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate against Kubernetes schemas
        run: |
          echo "::group::Kubeconform validation"
          helm template tekton-events-relay charts/tekton-events-relay | kubeconform -strict -summary -kubernetes-version 1.31.0
          echo "::endgroup::"

  security-analysis:
    name: Security Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3
        with:
          submodules: true

      - name: Install Helm
        uses: azure/setup-helm@v5.0.0
        with:
          version: "v3.16.3"

      - name: Install kubesec
        run: |
          curl -sSL https://github.com/controlplaneio/kubesec/releases/download/v2.14.2/kubesec_linux_amd64.tar.gz | tar xz
          sudo mv kubesec /usr/local/bin/

      - name: Kubesec security risk analysis
        run: |
          echo "::group::Kubesec security scan"
          helm template tekton-events-relay charts/tekton-events-relay > manifests.yaml
          kubesec scan manifests.yaml || true
          echo "::endgroup::"

      - name: Check Kubesec score
        run: |
          echo "::group::Security score check"
          SCORE=$(helm template tekton-events-relay charts/tekton-events-relay | kubesec scan - 2>&1 | jq -r '.[] | select(.score != 0) | .score' | head -1)
          echo "Kubesec Score: $SCORE"

          if [ -n "$SCORE" ] && [ "$SCORE" -lt 10 ]; then
            echo "::warning::Security score is $SCORE (recommended: 10+)"
          elif [ -n "$SCORE" ] && [ "$SCORE" -lt 0 ]; then
            echo "::error::Critical security issues detected (score < 0)"
            exit 1
          else
            echo "::notice::Security score: $SCORE ✅"
          fi
          echo "::endgroup::"

  best-practices:
    name: Best Practices & Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3
        with:
          submodules: true

      - name: Install Helm
        uses: azure/setup-helm@v5.0.0
        with:
          version: "v3.16.3"

      - name: Install KubeLinter
        run: |
          curl -L https://github.com/stackrox/kube-linter/releases/download/v0.8.3/kube-linter-linux.tar.gz | tar xz
          sudo mv kube-linter /usr/local/bin/

      - name: Run KubeLinter
        run: |
          echo "::group::KubeLinter checks"
          helm template tekton-events-relay charts/tekton-events-relay | kube-linter lint --config .kube-linter.yaml -
          echo "::endgroup::"

  vulnerability-scan:
    name: Vulnerability Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3

      - name: Run Trivy on Helm chart
        uses: aquasecurity/trivy-action@v0.36.0
        continue-on-error: true
        with:
          scan-type: "config"
          scan-ref: "charts/tekton-events-relay"
          format: "sarif"
          output: "trivy-helm-results.sarif"
          severity: "HIGH,CRITICAL"
          exit-code: "0"

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4.36.2
        if: hashFiles('trivy-helm-results.sarif') != ''
        with:
          sarif_file: "trivy-helm-results.sarif"
          category: trivy-helm-scan

  yaml-lint:
    name: YAML Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint on values files
        run: |
          echo "::group::YAML Lint"
          yamllint -c .yamllint.yaml charts/tekton-events-relay/values.yaml
          echo "::endgroup::"

  summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs:
      [
        helm-lint,
        schema-validation,
        security-analysis,
        best-practices,
        vulnerability-scan,
        yaml-lint,
      ]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "# 🛡️ Helm Chart Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Helm Lint | ${{ needs.helm-lint.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Schema Validation (Kubeconform) | ${{ needs.schema-validation.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Analysis (Kubesec) | ${{ needs.security-analysis.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Best Practices (KubeLinter) | ${{ needs.best-practices.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Vulnerability Scan (Trivy) | ${{ needs.vulnerability-scan.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| YAML Lint | ${{ needs.yaml-lint.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
