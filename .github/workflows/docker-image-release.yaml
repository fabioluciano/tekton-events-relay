# Workflow: Docker Build & Push
# Runs when a semantic tag is created (e.g., v1.2.3).
# The tag is created by the semantic-release workflow.
# Publishes the image to GitHub Container Registry (ghcr.io).
#
# Published images:
#   ghcr.io/fabioluciano/tekton-events-relay:latest
#   ghcr.io/fabioluciano/tekton-events-relay:1.2.3
#   ghcr.io/fabioluciano/tekton-events-relay:1.2
#   ghcr.io/fabioluciano/tekton-events-relay:1
name: Docker Build & Push

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write  # publish to GHCR

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: fabioluciano/tekton-events-relay

jobs:
  build-push:
    name: Build & Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.1.0
        with:
          # Multi-arch support: linux/amd64 (x86 servers)
          # and linux/arm64 (Graviton, Apple Silicon nodes, Raspberry Pi).
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Login to GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # full semantic tag: v1.2.3 → 1.2.3
            type=semver,pattern={{version}}
            # minor: v1.2.3 → 1.2
            type=semver,pattern={{major}}.{{minor}}
            # major: v1.2.3 → 1
            type=semver,pattern={{major}}
            # latest always points to most recent release
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=tekton-events-relay
            org.opencontainers.image.description=CloudEvents receiver that reports pipeline status to SCM providers
            org.opencontainers.image.url=https://github.com/fabioluciano/tekton-events-relay
            org.opencontainers.image.source=https://github.com/fabioluciano/tekton-events-relay
            org.opencontainers.image.licenses=MIT

      - name: Build and Push
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache between builds on GHCR.
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: Image digest
        run: echo "Pushed ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build-push.outputs.digest }}"
