# Workflow: Release
# Runs on: push to main (releases) and rc/** (prereleases)
# Job 1-3 (ci-*): validate code, Docker, Helm
# Job 4 (release): runs semantic-release to compute next version,
#   create Git tag, generate CHANGELOG, and publish GitHub Release.
# Jobs 5-7 (docker, helm): run only when a new release was published.
#
# Expected Conventional Commits:
#   feat:          → minor bump (1.x.0)
#   fix: / perf:   → patch bump (1.0.x)
#   feat!: / BREAKING CHANGE: → major bump (x.0.0)
name: Release

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    branches:
      - main
      - "rc/**"
      - "rc-*"

permissions:
  contents: write
  packages: write
  id-token: write
  pull-requests: write
  issues: write
  security-events: write
  actions: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: fabioluciano/tekton-events-relay

jobs:
  ci-go:
    name: Go CI
    uses: ./.github/workflows/ci-go.yaml
    secrets: inherit

  ci-docker:
    name: Docker CI
    uses: ./.github/workflows/ci-docker.yaml
    secrets: inherit

  ci-helm:
    name: Helm CI
    uses: ./.github/workflows/ci-helm.yaml
    secrets: inherit

  security:
    name: Security Scan
    uses: ./.github/workflows/security-codeql.yaml
    secrets: inherit
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: [ci-go, ci-docker, ci-helm]
    outputs:
      released: ${{ steps.release.outputs.new_release_published }}
      version: ${{ steps.release.outputs.new_release_version }}
      major: ${{ steps.release.outputs.new_release_major_version }}
      minor: ${{ steps.release.outputs.new_release_minor_version }}
      prerelease: ${{ steps.release.outputs.new_release_channel }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
          submodules: true

      - name: Install helm-docs
        run: |
          HELM_DOCS_VERSION="1.14.2"
          wget -qO /tmp/helm-docs.tar.gz "https://github.com/norwoodj/helm-docs/releases/download/v${HELM_DOCS_VERSION}/helm-docs_${HELM_DOCS_VERSION}_Linux_x86_64.tar.gz"
          tar -xzf /tmp/helm-docs.tar.gz -C /tmp
          sudo mv /tmp/helm-docs /usr/local/bin/helm-docs
          helm-docs --version

      - name: Run semantic-release
        id: release
        uses: cycjimmy/semantic-release-action@v6
        with:
          ci: true
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/exec
            @semantic-release/git
            @semantic-release/github
            @semantic-release/commit-analyzer
            @semantic-release/release-notes-generator
            conventional-changelog-conventionalcommits
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}

  docker:
    name: Build & Push Docker (${{ matrix.platform }})
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.released == 'true'
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          ref: v${{ needs.release.outputs.version }}
          submodules: true

      - name: Prepare platform pair
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV
          echo "GOARCH=${platform##*/}" >> $GITHUB_ENV

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary (native cross-compile, no QEMU)
        run: |
          mkdir -p bin
          CGO_ENABLED=0 GOOS=linux GOARCH=${{ env.GOARCH }} \
            go build \
            -mod=readonly \
            -ldflags="-s -w -X main.version=${{ needs.release.outputs.version }}" \
            -trimpath \
            -o bin/tekton-events-relay-linux-${{ env.GOARCH }} \
            ./cmd/receiver

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Login to GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: Dockerfile
          target: ci
          platforms: ${{ matrix.platform }}
          build-args: BINARY=bin/tekton-events-relay-linux-${{ env.GOARCH }}
          outputs: type=image,"name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}",push-by-digest=true,name-canonical=true,push=true,oci-mediatypes=true
          labels: |
            org.opencontainers.image.title=tekton-events-relay
            org.opencontainers.image.description=CloudEvents receiver that reports pipeline execution status to multiple SCM providers
            org.opencontainers.image.url=https://github.com/fabioluciano/tekton-events-relay
            org.opencontainers.image.source=https://github.com/fabioluciano/tekton-events-relay
            org.opencontainers.image.vendor=fabioluciano
            org.opencontainers.image.licenses=MIT
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ env.PLATFORM_PAIR }}
          provenance: false
          sbom: false

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-merge:
    name: Merge Docker manifests & sign
    runs-on: ubuntu-latest
    needs: [release, docker]
    if: needs.release.outputs.released == 'true'

    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0
        with:
          version: latest

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Login to GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: index
        uses: docker/metadata-action@v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=${{ needs.release.outputs.version }}
            type=raw,value=${{ needs.release.outputs.major }}.${{ needs.release.outputs.minor }},enable=${{ needs.release.outputs.prerelease == '' }},priority=800
            type=raw,value=${{ needs.release.outputs.major }},enable=${{ needs.release.outputs.prerelease == '' }},priority=700
            type=raw,value=latest,enable=${{ needs.release.outputs.prerelease == '' }},priority=600
            type=raw,value=${{ needs.release.outputs.prerelease }},enable=${{ needs.release.outputs.prerelease != '' }},priority=500
          labels: |
            org.opencontainers.image.title=tekton-events-relay
            org.opencontainers.image.description=CloudEvents receiver that reports pipeline execution status to multiple SCM providers
            org.opencontainers.image.url=https://github.com/fabioluciano/tekton-events-relay
            org.opencontainers.image.source=https://github.com/fabioluciano/tekton-events-relay
            org.opencontainers.image.vendor=fabioluciano
            org.opencontainers.image.licenses=MIT

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          TAGS=$(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          docker buildx imagetools create \
            $TAGS \
            --annotation "index:org.opencontainers.image.title=tekton-events-relay" \
            --annotation "index:org.opencontainers.image.description=CloudEvents receiver that reports pipeline execution status to multiple SCM providers" \
            --annotation "index:org.opencontainers.image.url=https://github.com/fabioluciano/tekton-events-relay" \
            --annotation "index:org.opencontainers.image.source=https://github.com/fabioluciano/tekton-events-relay" \
            --annotation "index:org.opencontainers.image.vendor=fabioluciano" \
            --annotation "index:org.opencontainers.image.licenses=MIT" \
            --annotation "index:org.opencontainers.image.version=${{ needs.release.outputs.version }}" \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect manifest
        run: |
          docker buildx imagetools inspect \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.release.outputs.version }}

      - name: Sign manifest with Cosign
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          DIGEST=$(docker buildx imagetools inspect --format '{{json .Manifest}}' \
            "${IMAGE}:${{ needs.release.outputs.version }}" | jq -r '.digest')
          TAGS="${{ steps.meta.outputs.tags }}"
          for tag in $TAGS; do
            cosign sign --yes "${tag}@${DIGEST}"
          done

  helm:
    name: Package and Publish Helm Chart
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.released == 'true'
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          ref: v${{ needs.release.outputs.version }}
          fetch-depth: 0
          submodules: true

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v5.0.0
        with:
          version: "v3.16.3"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Login to GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install ORAS
        uses: oras-project/setup-oras@v2.0.0

      - name: Push ArtifactHub metadata
        run: |
          oras push \
            ghcr.io/fabioluciano/charts/tekton-events-relay:artifacthub.io \
            --config /dev/null:application/vnd.cncf.artifacthub.config.v1+yaml \
            artifacthub-repo.yml:application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml

      - name: Package chart
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          helm package charts/tekton-events-relay --version $VERSION

      - name: Push to OCI registry
        id: push
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          OUTPUT=$(helm push tekton-events-relay-${VERSION}.tgz oci://ghcr.io/fabioluciano/charts 2>&1)
          echo "$OUTPUT"
          DIGEST=$(echo "$OUTPUT" | grep -i "digest:" | sed 's/.*Digest: *//i' | tr -d '\n\r ')
          echo "Extracted digest: $DIGEST"
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Sign Helm chart with Cosign
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          DIGEST="${{ steps.push.outputs.digest }}"
          if [ -n "$DIGEST" ]; then
            cosign sign --yes "ghcr.io/fabioluciano/charts/tekton-events-relay@$DIGEST"
          else
            cosign sign --yes "ghcr.io/fabioluciano/charts/tekton-events-relay:${VERSION}"
          fi
