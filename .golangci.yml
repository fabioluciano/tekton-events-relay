# golangci-lint configuration for tekton-events-relay
# Reference: https://golangci-lint.run/usage/configuration/
version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly
  allow-parallel-runners: true

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unused
    - goconst
    - misspell
    - revive
    - unconvert
    - unparam
    - gocritic
    - gosec
    - errorlint
    - errname
    - gocyclo
    - dupl
    - bodyclose
    - rowserrcheck
    - sqlclosecheck
    - nilerr
    - nilnil
    - wastedassign
    - whitespace
    - nakedret
    - predeclared

  disable:
    - exhaustive
    - exhaustruct
    - gochecknoinits
    - gochecknoglobals
    - lll
    - paralleltest
    - varnamelen
    - wrapcheck
    - nlreturn
    - godox
    - prealloc
    - noctx
    - nestif

  settings:
    goconst:
      min-occurrences: 5
    dupl:
      threshold: 150

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
