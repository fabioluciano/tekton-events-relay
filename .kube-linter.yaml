# KubeLinter configuration for Kubernetes best practices
# Reference: https://docs.kubelinter.io/#/configuring-kubelinter

# Custom checks configuration
customChecks: []

# Checks to include - ALL built-in checks enabled
checks:
  addAllBuiltIn: true
  # Exclude checks that are deployment-specific or cosmetic
  exclude:
    - "use-namespace" # Namespace is defined at deployment time, not in chart
    - "minimum-three-replicas" # Project uses 2 replicas by design

# Ignore specific paths
ignorepaths:
  - "charts/tekton-events-relay/templates/tests/"
  - "*.tpl"

# Severity thresholds - all warnings are severe
severeWarnings:
  - "privilege-escalation-container"
  - "privileged-container"
  - "run-as-non-root"
  - "non-existent-service-account"
  - "docker-sock"
  - "unsafe-proc-mount"
  - "unsafe-sysctls"
  - "writable-host-mount"
  - "host-ipc"
  - "host-network"
  - "host-pid"
  - "dangling-service"
  - "mismatching-selector"
  - "writable-host-mount"
  - "no-read-only-root-fs"
  - "unset-cpu-requirements"
  - "unset-memory-requirements"
  - "no-anti-affinity"
  - "minimum-three-replicas"
  - "latest-tag"
  - "required-label-owner"
  - "required-annotation-email"
