# yamllint configuration — used by pre-commit hook.
extends: default

rules:
  line-length:
    max: 120
    level: warning
  comments:
    min-spaces-from-content: 1
  truthy:
    # Allow "on" as key in GitHub Actions workflows.
    allowed-values: ["true", "false", "yes", "no", "on", "off"]
    check-keys: false
  braces:
    max-spaces-inside: 1
  brackets:
    max-spaces-inside: 1
