apiVersion: v2
name: tekton-events-relay
description: CloudEvents receiver that reports pipeline execution status to multiple SCM providers
type: application
version: 0.10.0
appVersion: "0.10.0"
dependencies:
  - name: valkey
    version: 0.9.4
    condition: config.store.valkey.embedded.enabled
    repository: https://valkey.io/valkey-helm/
annotations:
  org.opencontainers.image.source: https://github.com/fabioluciano/tekton-events-relay
  artifacthub.io/category: integration-delivery
  artifacthub.io/license: MIT
  artifacthub.io/images: |
    - name: tekton-events-relay
      image: ghcr.io/fabioluciano/tekton-events-relay:0.10.0
      platforms:
        - linux/amd64
        - linux/arm64
  artifacthub.io/links: |
    - name: GitHub Repository
      url: https://github.com/fabioluciano/tekton-events-relay
    - name: Documentation
      url: https://github.com/fabioluciano/tekton-events-relay/wiki
keywords:
  - tekton
  - cloudevents
  - scm
  - cicd
home: https://github.com/fabioluciano/tekton-events-relay
icon: https://raw.githubusercontent.com/fabioluciano/tekton-events-relay/main/assets/icon.svg
sources:
  - https://github.com/fabioluciano/tekton-events-relay
maintainers:
  - name: fabioluciano
    email: hi@fabioluciano.com
    url: https://fabioluciano.com
