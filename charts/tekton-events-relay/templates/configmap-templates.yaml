  teams-default.tmpl: |
    {{ "{{- if eq .State \"success\" }}" }}✅{{ "{{- else if eq .State \"failure\" }}" }}❌{{ "{{- else if eq .State \"error\" }}" }}⚠️{{ "{{- else if eq .State \"canceled\" }}" }}🚫{{ "{{- else }}" }}⏳{{ "{{- end }}" }} **{{ "{{ if .PipelineName }}" }}{{ "{{ .PipelineName }}" }}{{ "{{ else }}" }}{{ "{{ .RunName }}" }}{{ "{{ end }}" }}** — **{{ "{{ .State }}" }}**

    - **Run:** {{ "{{ .RunName }}" }}
    - **Namespace:** {{ "{{ .Namespace }}" }}
    {{ "{{- if .CommitSHA }}" }}
    - **Commit:** {{ "{{ printf \"%.8s\" .CommitSHA }}" }}
    {{ "{{- end }}" }}
    {{ "{{- if and (not .StartedAt.IsZero) (not .FinishedAt.IsZero) }}" }}
    - **Duration:** {{ "{{ printf \"%.0fs\" (.FinishedAt.Sub .StartedAt).Seconds }}" }}
    {{ "{{- end }}" }}
    {{ "{{- if .Description }}" }}

    {{ "{{ printf \"%.200s\" .Description }}" }}
