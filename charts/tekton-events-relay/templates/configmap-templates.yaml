# Default notification templates, mounted at /etc/templates when
# templates.enabled=true and referenced from actions via
#   template_file: /etc/templates/<name>.tmpl
#
# Renderer capabilities differ per notifier:
#   - SCM comment/checkrun handlers, grafana and the accumulator compile with
#     sprig + domain helpers (Truncate, IssueRef, PRRef, UserMention).
#   - slack, discord and teams compile with plain Go text/template only —
#     no sprig. Use builtin printf for truncation in those templates.
#   - datadog and pagerduty do NOT support templates (events are built
#     natively by the notifier), so no defaults exist for them here.
apiVersion: v1
data:
  # Accumulator summary (sprig available). Destination is the provider the
  # accumulator dispatches to, so keep formatting markdown-light.
  accumulator-default.tmpl: |
    {{ "{{- if eq .State \"success\" }}" }}✅{{ "{{- else if eq .State \"failure\" }}" }}❌{{ "{{- else if eq .State \"error\" }}" }}⚠️{{ "{{- else if eq .State \"canceled\" }}" }}🚫{{ "{{- else }}" }}⏳{{ "{{- end }}" }} Pipeline {{ "{{ .State }}" }} — {{ "{{ .PipelineName | default .RunName }}" }}

    Run: {{ "{{ .RunName }}" }}
    Namespace: {{ "{{ .Namespace }}" }}
    {{ "{{- if .CommitSHA }}" }}
    Commit: {{ "{{ .CommitSHA | trunc 8 }}" }}
    {{ "{{- end }}" }}
    {{ "{{- if .Context }}" }}
    Context: {{ "{{ .Context }}" }}
    {{ "{{- end }}" }}
    {{ "{{- if .TaskCount }}" }}
    Tasks: {{ "{{ .TaskCount }}" }}
    {{ "{{- end }}" }}
    {{ "{{- if and (not .StartedAt.IsZero) (not .FinishedAt.IsZero) }}" }}
    Duration: {{ "{{ regexReplaceAll \"[.][0-9]+s\" (toString (.FinishedAt.Sub .StartedAt)) \"s\" }}" }}
    {{ "{{- end }}" }}
    {{ "{{- if .Description }}" }}
    {{ "{{ Truncate .Description 300 }}" }}
    {{ "{{- end }}" }}
    {{ "{{- if .Results }}" }}
    Results:
    {{ "{{- range .Results }}" }}
    - {{ "{{ .Name }}" }}: {{ "{{ Truncate .Value 120 }}" }}
    {{ "{{- end }}" }}
    {{ "{{- end }}" }}
    {{ "{{- if .TargetURL }}" }}
    URL: {{ "{{ .TargetURL }}" }}
    {{ "{{- end }}" }}

  # Azure DevOps PR thread comment (sprig available; AzDO renders GFM tables,
  # but not <details>).
  azuredevops-comment.tmpl: |
    {{ "{{- $icon := \"⏳\" }}" }}
    {{ "{{- if eq .State \"success\" }}" }}{{ "{{- $icon = \"✅\" }}" }}
    {{ "{{- else if eq .State \"failure\" }}" }}{{ "{{- $icon = \"❌\" }}" }}
    {{ "{{- else if eq .State \"error\" }}" }}{{ "{{- $icon = \"⚠️\" }}" }}
    {{ "{{- else if eq .State \"canceled\" }}" }}{{ "{{- $icon = \"🚫\" }}" }}
    {{ "{{- end }}" }}
    ## {{ "{{ $icon }}" }} Pipeline `{{ "{{ .PipelineName | default .RunName }}" }}` — **{{ "{{ .State }}" }}**

    | | |
    |---|---|
    | **Run** | `{{ "{{ .RunName }}" }}` |
    | **Namespace** | `{{ "{{ .Namespace }}" }}` |
    {{ "{{- if .CommitSHA }}" }}
    | **Commit** | `{{ "{{ .CommitSHA | trunc 8 }}" }}` |
    {{ "{{- end }}" }}
    {{ "{{- if .TaskCount }}" }}
    | **Tasks** | {{ "{{ .TaskCount }}" }} |
    {{ "{{- end }}" }}
    {{ "{{- if and (not .StartedAt.IsZero) (not .FinishedAt.IsZero) }}" }}
    | **Duration** | {{ "{{ regexReplaceAll \"[.][0-9]+s\" (toString (.FinishedAt.Sub .StartedAt)) \"s\" }}" }} |
    {{ "{{- end }}" }}
    {{ "{{- if .Description }}" }}

    > {{ "{{ Truncate .Description 300 }}" }}
    {{ "{{- end }}" }}
    {{ "{{- if .Results }}" }}

    **Results**

    | Name | Value |
    |---|---|
    {{ "{{- range .Results }}" }}
    | `{{ "{{ .Name }}" }}` | `{{ "{{ Truncate .Value 120 }}" }}` |
    {{ "{{- end }}" }}
    {{ "{{- end }}" }}
    {{ "{{- if .TargetURL }}" }}

    🔗 [View logs in Tekton Dashboard]({{ "{{ .TargetURL }}" }})
    {{ "{{- end }}" }}

