    {{ "{{- range .Results }}" }}
    - `{{ "{{ .Name }}" }}`: {{ "{{ Truncate .Value 120 }}" }}
    {{ "{{- end }}" }}
    {{ "{{- end }}" }}
    {{ "{{- if .TargetURL }}" }}

