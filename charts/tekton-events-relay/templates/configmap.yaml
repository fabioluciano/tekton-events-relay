apiVersion: v1
data:
  # For complete configuration reference including all action handlers,
  # see docs/Configuration.md in the repository
  config.yaml: |
    server:
      addr: {{ .Values.config.server.addr | quote }}
      {{- if .Values.config.server.metrics_addr }}
      metrics_addr: {{ .Values.config.server.metrics_addr | quote }}
      {{- end }}
      read_timeout_sec: {{ .Values.config.server.read_timeout_sec }}
      write_timeout_sec: {{ .Values.config.server.write_timeout_sec }}
      shutdown_timeout_sec: {{ .Values.config.server.shutdown_timeout_sec }}
      max_body_size: {{ .Values.config.server.max_body_size | int }}

      {{- if .Values.config.server.rate_limit.enabled }}
      rate_limit:
        enabled: true
        requests_per_second: {{ .Values.config.server.rate_limit.requests_per_second }}
        burst: {{ .Values.config.server.rate_limit.burst }}
      {{- end }}

      {{- if .Values.config.server.auth.enabled }}
      auth:
        enabled: true
        type: {{ .Values.config.server.auth.type | quote }}
        secret_file: {{ include "tekton-events-relay.resolveValue" (dict "field" .Values.config.server.auth.secret "provider" "server" "instance" "auth" "key" "secret") }}
        {{- if .Values.config.server.auth.validate_timestamp }}
        validate_timestamp: true
        timestamp_tolerance: {{ .Values.config.server.auth.timestamp_tolerance | default "5m" | quote }}
        {{- end }}
      {{- end }}
      {{- if and .Values.config.server.tls .Values.config.server.tls.cert_file .Values.config.server.tls.key_file }}
      tls:
        cert_file: {{ .Values.config.server.tls.cert_file | quote }}
        key_file: {{ .Values.config.server.tls.key_file | quote }}
      {{- end }}

    dashboard_url: {{ .Values.config.dashboard_url | quote }}
    dedupe_size: {{ .Values.config.dedupe_size }}
    {{- if .Values.config.handler_timeout }}
    handler_timeout: {{ .Values.config.handler_timeout | quote }}
    {{- end }}

    {{- if .Values.config.retry }}
    retry:
      max_attempts: {{ .Values.config.retry.max_attempts }}
      initial_backoff: {{ .Values.config.retry.initial_backoff | quote }}
      max_backoff: {{ .Values.config.retry.max_backoff | quote }}
    {{- end }}

    {{- if .Values.config.store }}
    store:
      backend: {{ .Values.config.store.backend | quote }}
      ttl: {{ .Values.config.store.ttl | quote }}
      {{- if eq .Values.config.store.backend "valkey" }}
      valkey:
        {{- if .Values.config.store.valkey.embedded.enabled }}
        address: "{{ include "tekton-events-relay.fullname" . }}-valkey:{{ (index .Subcharts "valkey").Values.service.port | default 6379 }}"
        {{- else }}
        address: {{ required "config.store.valkey.address is required when store.backend=valkey and embedded is disabled" .Values.config.store.valkey.address | quote }}
        {{- end }}
        {{- if .Values.config.store.valkey.password }}
        password_file: {{ include "tekton-events-relay.resolveValue" (dict "field" .Values.config.store.valkey.password "provider" "valkey" "instance" "default" "key" "password") }}
        {{- end }}
        db: {{ .Values.config.store.valkey.db | int }}
        key_prefix: {{ .Values.config.store.valkey.key_prefix | quote }}
      {{- end }}
      {{- if eq .Values.config.store.backend "olric" }}
      olric:
        bind_port: {{ .Values.config.store.olric.bind_port }}
        memberlist_port: {{ .Values.config.store.olric.memberlist_port }}
        peers:
          {{- if .Values.config.store.olric.peers }}
          {{- range .Values.config.store.olric.peers }}
          - {{ . | quote }}
          {{- end }}
          {{- else }}
          - "{{ include "tekton-events-relay.fullname" . }}-gossip:{{ .Values.config.store.olric.memberlist_port }}"
          {{- end }}
      {{- end }}
    {{- end }}

    {{- if .Values.config.dlq.enabled }}
    dlq:
      enabled: true
      path: {{ .Values.config.dlq.path | quote }}
      max_size_bytes: {{ .Values.config.dlq.max_size_bytes | int }}
    {{- end }}

    {{- if .Values.config.accumulator }}
    accumulator:
      enabled: {{ .Values.config.accumulator.enabled }}
      ttl: {{ .Values.config.accumulator.ttl | quote }}
      max_size: {{ .Values.config.accumulator.max_size }}
    {{- end }}

    {{- if .Values.config.logging }}
    logging:
      level: {{ .Values.config.logging.level | quote }}
      {{- if .Values.config.logging.verbose }}
      verbose:
        caller: {{ .Values.config.logging.verbose.caller }}
        http_calls: {{ .Values.config.logging.verbose.http_calls }}
        payloads: {{ .Values.config.logging.verbose.payloads }}
      {{- end }}
    {{- end }}

    filter:
      allow_taskrun: {{ .Values.config.filter.allow_taskrun }}
      allow_pipelinerun: {{ .Values.config.filter.allow_pipelinerun }}
      allow_customrun: {{ .Values.config.filter.allow_customrun }}
      allow_eventlistener: {{ .Values.config.filter.allow_eventlistener }}
      ignore_unknown: {{ .Values.config.filter.ignore_unknown }}
      allow_namespaces:
      {{- range .Values.config.filter.allow_namespaces }}
        - {{ . | quote }}
      {{- end }}
      deny_namespaces:
      {{- range .Values.config.filter.deny_namespaces }}
        - {{ . | quote }}
      {{- end }}

    {{- if .Values.config.tracing }}
    {{- if .Values.config.tracing.endpoint }}
    tracing:
      endpoint: {{ .Values.config.tracing.endpoint | quote }}
      {{- if .Values.config.tracing.service_name }}
      service_name: {{ .Values.config.tracing.service_name | quote }}
      {{- end }}
      insecure: {{ .Values.config.tracing.insecure | default false }}
    {{- end }}
    {{- end }}

    {{- if .Values.config.scm }}
    scm:
      {{- if .Values.config.scm.github }}
      github:
        {{- range .Values.config.scm.github }}
        - name: {{ .name }}
          enabled: {{ .enabled }}
          {{- if .auth }}
          auth:
            {{- if .auth.secretRef }}
            secret_file: {{ include "tekton-events-relay.resolveValue" (dict "field" .auth "provider" "github" "instance" .name "key" (default "token" .auth.secretRef.key)) }}
            {{- end }}
            {{- if .auth.app_id }}
            app_id: {{ .auth.app_id }}
            {{- end }}
            {{- if .auth.installation_id }}
            installation_id: {{ .auth.installation_id }}
            {{- end }}
            {{- if .auth.private_key }}
            private_key_file: {{ include "tekton-events-relay.resolveValueWithBase" (dict "field" .auth.private_key "base" "/etc/github-app" "instance" .name "key" "private-key.pem") }}
            {{- end }}
          {{- end }}
          {{- if .base_url }}
          base_url: {{ .base_url | quote }}
          {{- end }}
          {{- if .insecure_skip_verify }}
          insecure_skip_verify: {{ .insecure_skip_verify }}
          {{- end }}
          {{- if .actions }}
          actions:
            {{- range .actions }}
            - name: {{ .name }}
              type: {{ .type }}
              enabled: {{ .enabled }}
              {{- if .when }}
              when: {{ .when | quote }}
              {{- end }}
              {{- if .mode }}
              mode: {{ .mode | quote }}
              {{- end }}
              {{- if .context_per_task }}
              context_per_task: true
              {{- end }}
              {{- if and .template (kindIs "map" .template) .template.configmapRef }}
              template_file: "/etc/templates/{{ default "tekton-events-relay-templates" .template.configmapRef.name }}/{{ .template.configmapRef.key }}"
              {{- else if .template }}
              template: |
{{- if kindIs "map" .template }}
{{ .template.value | nindent 16 }}
{{- else }}
{{ .template | nindent 16 }}
{{- end }}
              {{- end }}
              {{- if .labels }}
              labels:
                {{- if .labels.add }}
                add:
                  {{- range .labels.add }}
                  {{- if kindIs "map" . }}
                  - name: {{ .name | quote }}
                    color: {{ .color | default "" | quote }}
                  {{- else }}
                  - {{ . | quote }}
                  {{- end }}
                  {{- end }}
                {{- end }}
                {{- if .labels.remove }}
                remove:
                  {{- range .labels.remove }}
                  {{- if kindIs "map" . }}
                  - name: {{ .name | quote }}
                    color: {{ .color | default "" | quote }}
                  {{- else }}
                  - {{ . | quote }}
                  {{- end }}
                  {{- end }}
                {{- end }}
              {{- end }}
            {{- end }}
          {{- end }}
        {{- end }}
      {{- end }}

      {{- if .Values.config.scm.gitlab }}
      gitlab:
        {{- range .Values.config.scm.gitlab }}
        - name: {{ .name }}
          variant: {{ .variant }}
          enabled: {{ .enabled }}
          {{- if .auth }}
          auth:
            {{- if .auth.secretRef }}
            secret_file: {{ include "tekton-events-relay.resolveValue" (dict "field" .auth "provider" "gitlab" "instance" .name "key" (default "token" .auth.secretRef.key)) }}
            {{- end }}
            {{- if .auth.oauth2 }}
            oauth2:
              {{- if .auth.oauth2.client_id }}
              client_id_file: {{ include "tekton-events-relay.resolveValue" (dict "field" .auth.oauth2.client_id "provider" "gitlab" "instance" .name "key" (default "client_id" (or .auth.oauth2.client_id.secretRef.key .auth.oauth2.client_id.configmapRef.key))) }}
              {{- end }}
              {{- if .auth.oauth2.client_secret }}
              client_secret_file: {{ include "tekton-events-relay.resolveValue" (dict "field" .auth.oauth2.client_secret "provider" "gitlab" "instance" .name "key" (default "client_secret" (or .auth.oauth2.client_secret.secretRef.key .auth.oauth2.client_secret.configmapRef.key))) }}
              {{- end }}
              {{- if .auth.oauth2.grant_type }}
              grant_type: {{ .auth.oauth2.grant_type | quote }}
              {{- end }}
              {{- if .auth.oauth2.refresh_token }}
              refresh_token_file: {{ include "tekton-events-relay.resolveValue" (dict "field" .auth.oauth2.refresh_token "provider" "gitlab" "instance" .name "key" (default "refresh_token" (or .auth.oauth2.refresh_token.secretRef.key .auth.oauth2.refresh_token.configmapRef.key))) }}
              {{- end }}
              token_url: {{ .auth.oauth2.token_url | quote }}
            {{- end }}
          {{- end }}
          {{- if .base_url }}
          base_url: {{ .base_url | quote }}
          {{- end }}
          {{- if .insecure_skip_verify }}
          insecure_skip_verify: {{ .insecure_skip_verify }}
          {{- end }}
          {{- if .actions }}
          actions:
            {{- range .actions }}
            - name: {{ .name }}
              type: {{ .type }}
              enabled: {{ .enabled }}
              {{- if .when }}
              when: {{ .when | quote }}
              {{- end }}
              {{- if .mode }}
              mode: {{ .mode | quote }}
              {{- end }}
              {{- if .context_per_task }}
              context_per_task: true
              {{- end }}
              {{- if and .template (kindIs "map" .template) .template.configmapRef }}
              template_file: "/etc/templates/{{ default "tekton-events-relay-templates" .template.configmapRef.name }}/{{ .template.configmapRef.key }}"
              {{- else if .template }}
              template: |
{{- if kindIs "map" .template }}
{{ .template.value | nindent 16 }}
{{- else }}
{{ .template | nindent 16 }}
{{- end }}
              {{- end }}
              {{- if .labels }}
              labels:
                {{- if .labels.add }}
                add:
                  {{- range .labels.add }}
                  {{- if kindIs "map" . }}
                  - name: {{ .name | quote }}
                    color: {{ .color | default "" | quote }}
                  {{- else }}
                  - {{ . | quote }}
                  {{- end }}
                  {{- end }}
                {{- end }}
                {{- if .labels.remove }}
                remove:
                  {{- range .labels.remove }}
                  {{- if kindIs "map" . }}
                  - name: {{ .name | quote }}
                    color: {{ .color | default "" | quote }}
                  {{- else }}
                  - {{ . | quote }}
                  {{- end }}
                  {{- end }}
                {{- end }}
              {{- end }}
            {{- end }}
          {{- end }}
        {{- end }}
      {{- end }}

      {{- if .Values.config.scm.bitbucket }}
      bitbucket:
        {{- range .Values.config.scm.bitbucket }}
        - name: {{ .name }}
          variant: {{ .variant }}
          enabled: {{ .enabled }}
          {{- if .auth }}
          auth:
            {{- if .auth.username }}
            username_file: {{ include "tekton-events-relay.resolveValue" (dict "field" .auth.username "provider" "bitbucket" "instance" .name "key" (default "username" (or .auth.username.secretRef.key .auth.username.configmapRef.key))) }}
            {{- end }}
            {{- if .auth.app_password }}
            app_password_file: {{ include "tekton-events-relay.resolveValue" (dict "field" .auth.app_password "provider" "bitbucket" "instance" .name "key" (default "app_password" .auth.app_password.secretRef.key)) }}
            {{- end }}
            {{- if .auth.secretRef }}
            token_file: {{ include "tekton-events-relay.resolveValue" (dict "field" .auth "provider" "bitbucket" "instance" .name "key" (default "token" .auth.secretRef.key)) }}
            {{- end }}
            {{- if .auth.oauth2 }}
            oauth2:
              {{- if .auth.oauth2.client_id }}
              client_id_file: {{ include "tekton-events-relay.resolveValue" (dict "field" .auth.oauth2.client_id "provider" "bitbucket" "instance" .name "key" (default "client_id" (or .auth.oauth2.client_id.secretRef.key .auth.oauth2.client_id.configmapRef.key))) }}
              {{- end }}
              {{- if .auth.oauth2.client_secret }}
              client_secret_file: {{ include "tekton-events-relay.resolveValue" (dict "field" .auth.oauth2.client_secret "provider" "bitbucket" "instance" .name "key" (default "client_secret" (or .auth.oauth2.client_secret.secretRef.key .auth.oauth2.client_secret.configmapRef.key))) }}
              {{- end }}
              {{- if .auth.oauth2.grant_type }}
              grant_type: {{ .auth.oauth2.grant_type | quote }}
              {{- end }}
              {{- if .auth.oauth2.refresh_token }}
              refresh_token_file: {{ include "tekton-events-relay.resolveValue" (dict "field" .auth.oauth2.refresh_token "provider" "bitbucket" "instance" .name "key" (default "refresh_token" (or .auth.oauth2.refresh_token.secretRef.key .auth.oauth2.refresh_token.configmapRef.key))) }}
              {{- end }}
              token_url: {{ .auth.oauth2.token_url | quote }}
            {{- end }}
          {{- end }}
          {{- if .base_url }}
          base_url: {{ .base_url | quote }}
          {{- end }}
          {{- if .insecure_skip_verify }}
          insecure_skip_verify: {{ .insecure_skip_verify }}
          {{- end }}
          {{- if .actions }}
          actions:
            {{- range .actions }}
            - name: {{ .name }}
              type: {{ .type }}
              enabled: {{ .enabled }}
              {{- if .when }}
              when: {{ .when | quote }}
              {{- end }}
              {{- if .mode }}
              mode: {{ .mode | quote }}
              {{- end }}
              {{- if .context_per_task }}
              context_per_task: true
              {{- end }}
            {{- end }}
          {{- end }}
        {{- end }}
      {{- end }}

      {{- if .Values.config.scm.azure_devops }}
      azure_devops:
        {{- range .Values.config.scm.azure_devops }}
        - name: {{ .name }}
          enabled: {{ .enabled }}
          {{- if .secretRef }}
          secret_file: {{ include "tekton-events-relay.resolveValue" (dict "field" . "provider" "azure" "instance" .name "key" (default "token" .secretRef.key)) }}
          {{- end }}
          genre: {{ .genre | quote }}
          {{- if .base_url }}
          base_url: {{ .base_url | quote }}
          {{- end }}
          {{- if .insecure_skip_verify }}
          insecure_skip_verify: {{ .insecure_skip_verify }}
          {{- end }}
          {{- if .actions }}
          actions:
            {{- range .actions }}
            - name: {{ .name }}
              type: {{ .type }}
              enabled: {{ .enabled }}
              {{- if .when }}
              when: {{ .when | quote }}
              {{- end }}
              {{- if .mode }}
              mode: {{ .mode | quote }}
              {{- end }}
              {{- if .context_per_task }}
              context_per_task: true
              {{- end }}
              {{- if and .template (kindIs "map" .template) .template.configmapRef }}
              template_file: "/etc/templates/{{ default "tekton-events-relay-templates" .template.configmapRef.name }}/{{ .template.configmapRef.key }}"
              {{- else if .template }}
              template: |
{{- if kindIs "map" .template }}
{{ .template.value | nindent 16 }}
{{- else }}
{{ .template | nindent 16 }}
{{- end }}
              {{- end }}
              {{- if .labels }}
              labels:
                {{- if .labels.add }}
                add:
                  {{- range .labels.add }}
                  {{- if kindIs "map" . }}
                  - name: {{ .name | quote }}
                    color: {{ .color | default "" | quote }}
                  {{- else }}
                  - {{ . | quote }}
                  {{- end }}
                  {{- end }}
                {{- end }}
                {{- if .labels.remove }}
                remove:
                  {{- range .labels.remove }}
                  {{- if kindIs "map" . }}
                  - name: {{ .name | quote }}
                    color: {{ .color | default "" | quote }}
                  {{- else }}
                  - {{ . | quote }}
                  {{- end }}
                  {{- end }}
                {{- end }}
              {{- end }}
            {{- end }}
          {{- end }}
        {{- end }}
      {{- end }}

      {{- if .Values.config.scm.gitea }}
      gitea:
        {{- range .Values.config.scm.gitea }}
        - name: {{ .name }}
          enabled: {{ .enabled }}
          {{- if .auth }}
          auth:
            {{- if .auth.secretRef }}
            secret_file: {{ include "tekton-events-relay.resolveValue" (dict "field" .auth "provider" "gitea" "instance" .name "key" (default "token" .auth.secretRef.key)) }}
            {{- end }}
            {{- if .auth.oauth2 }}
            oauth2:
              {{- if .auth.oauth2.client_id }}
              client_id_file: {{ include "tekton-events-relay.resolveValue" (dict "field" .auth.oauth2.client_id "provider" "gitea" "instance" .name "key" (default "client_id" (or .auth.oauth2.client_id.secretRef.key .auth.oauth2.client_id.configmapRef.key))) }}
              {{- end }}
              {{- if .auth.oauth2.client_secret }}
              client_secret_file: {{ include "tekton-events-relay.resolveValue" (dict "field" .auth.oauth2.client_secret "provider" "gitea" "instance" .name "key" (default "client_secret" (or .auth.oauth2.client_secret.secretRef.key .auth.oauth2.client_secret.configmapRef.key))) }}
              {{- end }}
              {{- if .auth.oauth2.grant_type }}
              grant_type: {{ .auth.oauth2.grant_type | quote }}
              {{- end }}
              {{- if .auth.oauth2.refresh_token }}
              refresh_token_file: {{ include "tekton-events-relay.resolveValue" (dict "field" .auth.oauth2.refresh_token "provider" "gitea" "instance" .name "key" (default "refresh_token" (or .auth.oauth2.refresh_token.secretRef.key .auth.oauth2.refresh_token.configmapRef.key))) }}
              {{- end }}
              token_url: {{ .auth.oauth2.token_url | quote }}
            {{- end }}
          {{- end }}
          base_url: {{ .base_url | quote }}
          {{- if .insecure_skip_verify }}
          insecure_skip_verify: {{ .insecure_skip_verify }}
          {{- end }}
          {{- if .actions }}
          actions:
            {{- range .actions }}
            - name: {{ .name }}
              type: {{ .type }}
              enabled: {{ .enabled }}
              {{- if .when }}
              when: {{ .when | quote }}
              {{- end }}
              {{- if .mode }}
              mode: {{ .mode | quote }}
              {{- end }}
              {{- if .context_per_task }}
              context_per_task: true
              {{- end }}
              {{- if and .template (kindIs "map" .template) .template.configmapRef }}
              template_file: "/etc/templates/{{ default "tekton-events-relay-templates" .template.configmapRef.name }}/{{ .template.configmapRef.key }}"
              {{- else if .template }}
              template: |
{{- if kindIs "map" .template }}
{{ .template.value | nindent 16 }}
{{- else }}
{{ .template | nindent 16 }}
{{- end }}
              {{- end }}
              {{- if .labels }}
              labels:
                {{- if .labels.add }}
                add:
                  {{- range .labels.add }}
                  {{- if kindIs "map" . }}
                  - name: {{ .name | quote }}
                    color: {{ .color | default "" | quote }}
                  {{- else }}
                  - {{ . | quote }}
                  {{- end }}
                  {{- end }}
                {{- end }}
                {{- if .labels.remove }}
                remove:
                  {{- range .labels.remove }}
                  {{- if kindIs "map" . }}
                  - name: {{ .name | quote }}
                    color: {{ .color | default "" | quote }}
                  {{- else }}
                  - {{ . | quote }}
                  {{- end }}
                  {{- end }}
                {{- end }}
              {{- end }}
            {{- end }}
          {{- end }}
        {{- end }}
      {{- end }}

      {{- if .Values.config.scm.sourcehut }}
      sourcehut:
        {{- range .Values.config.scm.sourcehut }}
        - name: {{ .name }}
          enabled: {{ .enabled }}
          {{- if .auth }}
          auth:
            {{- if .auth.secretRef }}
            secret_file: {{ include "tekton-events-relay.resolveValue" (dict "field" .auth "provider" "sourcehut" "instance" .name "key" (default "token" .auth.secretRef.key)) }}
            {{- end }}
          {{- end }}
          {{- if .base_url }}
          base_url: {{ .base_url | quote }}
          {{- end }}
          {{- if .insecure_skip_verify }}
          insecure_skip_verify: {{ .insecure_skip_verify }}
          {{- end }}
          {{- if .actions }}
          actions:
            {{- range .actions }}
            - name: {{ .name }}
              type: {{ .type }}
              enabled: {{ .enabled }}
              {{- if .when }}
              when: {{ .when | quote }}
              {{- end }}
              {{- if .mode }}
              mode: {{ .mode | quote }}
              {{- end }}
              {{- if .context_per_task }}
              context_per_task: true
              {{- end }}
            {{- end }}
          {{- end }}
        {{- end }}
      {{- end }}
    {{- end }}

    {{- if .Values.config.notifiers }}
    notifiers:
      {{- if .Values.config.notifiers.slack }}
      slack:
        {{- range .Values.config.notifiers.slack }}
        - name: {{ .name }}
          enabled: {{ .enabled }}
          {{- if or .webhook_url .bot_token }}
          auth:
            {{- if .bot_token }}
            bot_token:
              token_file: {{ include "tekton-events-relay.resolveValue" (dict "field" .bot_token.token "provider" "slack" "instance" .name "key" (default "token" .bot_token.token.secretRef.key)) }}
              channel_id: {{ .bot_token.channel_id | quote }}
            {{- else if .webhook_url }}
            webhook_url_file: {{ include "tekton-events-relay.resolveValue" (dict "field" .webhook_url "provider" "slack" "instance" .name "key" (default "webhook_url" (or .webhook_url.secretRef.key .webhook_url.configmapRef.key))) }}
            {{- end }}
          {{- end }}
          {{- if .channel }}
          channel: {{ .channel | quote }}
          {{- end }}
          {{- if .username }}
          username: {{ .username | quote }}
          {{- end }}
          {{- if .icon_emoji }}
          icon_emoji: {{ .icon_emoji | quote }}
          {{- end }}
          {{- if .mode }}
          mode: {{ .mode | quote }}
          {{- end }}
          {{- if .thread_ts }}
          thread_ts: {{ .thread_ts | quote }}
          {{- end }}
          {{- if .when }}
          when: {{ .when | quote }}
          {{- end }}
          {{- if and .template (kindIs "map" .template) .template.configmapRef }}
          template_file: "/etc/templates/{{ default "tekton-events-relay-templates" .template.configmapRef.name }}/{{ .template.configmapRef.key }}"
          {{- else if .template }}
          template: |
{{- if kindIs "map" .template }}
{{ .template.value | nindent 12 }}
{{- else }}
{{ .template | nindent 12 }}
{{- end }}
          {{- end }}
        {{- end }}
      {{- end }}
      {{- if .Values.config.notifiers.teams }}
      teams:
        {{- range .Values.config.notifiers.teams }}
        - name: {{ .name }}
          enabled: {{ .enabled }}
          {{- if .webhook_url }}
          auth:
