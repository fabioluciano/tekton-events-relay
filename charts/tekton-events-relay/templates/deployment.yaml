        - name: sourcehut-{{ $inst.name }}-secret
          secret:
            secretName: {{ $inst.auth.secretRef.secretName }}
        {{- end }}
        {{- end }}
        {{- range $inst := .Values.config.notifiers.slack }}
        {{- if and $inst.enabled $inst.secretRef }}
        - name: slack-{{ $inst.name }}-secret
          secret:
            secretName: {{ $inst.secretRef.secretName }}
        {{- end }}
        {{- if and $inst.enabled $inst.bot_token $inst.bot_token.secretRef }}
        - name: slack-{{ $inst.name }}-secret
          secret:
            secretName: {{ $inst.bot_token.secretRef.secretName }}
        {{- end }}
        {{- end }}
        {{- range $inst := .Values.config.notifiers.teams }}
        {{- if and $inst.enabled $inst.secretRef }}
        - name: teams-{{ $inst.name }}-secret
          secret:
            secretName: {{ $inst.secretRef.secretName }}
        {{- end }}
        {{- end }}
