        {{- end }}
        {{- end }}
        {{- range $inst := .Values.config.notifiers.email }}
        {{- if and $inst.enabled $inst.secretRef }}
        - name: email-{{ $inst.name }}-secret
          secret:
            secretName: {{ $inst.secretRef.secretName }}
        {{- end }}
        {{- end }}
        {{- range $inst := .Values.config.scm.github }}
        {{- range $action := $inst.actions }}
        {{- if $action.templateRef }}
        - configMap:
            name: {{ $action.templateRef.configmapName }}
          name: tpl-{{ $action.templateRef.configmapName }}
        {{- end }}
        {{- end }}
        {{- end }}
        {{- range $inst := .Values.config.scm.gitlab }}
        {{- range $action := $inst.actions }}
        {{- if $action.templateRef }}
        - configMap:
            name: {{ $action.templateRef.configmapName }}
