{{- include "tekton-events-relay.validateStore" . -}}
{{- include "tekton-events-relay.validateEmbeddedValkey" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    {{- include "tekton-events-relay.annotations" . | nindent 4 }}
    email: "{{ .Values.email | default "platform@example.com" }}"
    owner: "{{ .Values.owner | default "platform-team" }}"
  labels:
    {{- include "tekton-events-relay.labels" . | nindent 4 }}
    owner: "{{ .Values.owner | default "platform-team" }}"
  name: {{ include "tekton-events-relay.fullname" . }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "tekton-events-relay.selectorLabels" . | nindent 6 }}
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      annotations:
        {{- include "tekton-events-relay.annotations" . | nindent 8 }}
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        email: "{{ .Values.email | default "platform@example.com" }}"
        owner: "{{ .Values.owner | default "platform-team" }}"
      {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "tekton-events-relay.selectorLabels" . | nindent 8 }}
        owner: "{{ .Values.owner | default "platform-team" }}"
    spec:
      affinity:
        nodeAffinity:
          {{- toYaml .Values.affinity.nodeAffinity | nindent 10 }}
        {{- if eq (.Values.affinity.mode | default "soft") "hard" }}
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  {{- include "tekton-events-relay.selectorLabels" . | nindent 18 }}
              topologyKey: kubernetes.io/hostname
        {{- else }}
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "tekton-events-relay.selectorLabels" . | nindent 20 }}
                topologyKey: kubernetes.io/hostname
              weight: 100
        {{- end }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      containers:
        - args:
            - "--config"
            - "/etc/tekton-events-relay/config.yaml"
          {{- if or .Values.resources.limits.memory .Values.extraEnv }}
          env:
            {{- if .Values.resources.limits.memory }}
            # GOMEMLIMIT keeps the Go GC inside the container memory limit.
            # Derived from the actual limit at runtime (bytes), so it never
            # drifts when resources change.
            - name: GOMEMLIMIT
              valueFrom:
                resourceFieldRef:
                  containerName: receiver
                  resource: limits.memory
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          name: receiver
          ports:
            - containerPort: {{ .Values.service.targetPort }}
              name: http
              protocol: TCP
            {{- if .Values.config.server.metrics_addr }}
            - containerPort: {{ .Values.config.server.metrics_addr | trimPrefix ":" | atoi }}
              name: metrics
              protocol: TCP
            {{- end }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
          volumeMounts:
            - mountPath: /etc/tekton-events-relay
              name: config
              readOnly: true
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- if .Values.config.dlq.enabled }}
            - mountPath: /var/lib/tekton-events-relay
              name: dlq
            {{- end }}
            {{- range $provider, $instances := .Values.config.scm }}
            {{- range $inst := $instances }}
            {{- if $inst.enabled }}
            {{- include "tekton-events-relay.scmVolumeMounts" (dict "provider" $provider "instance" $inst) | nindent 12 }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- range $provider, $instances := .Values.config.notifiers }}
            {{- range $inst := $instances }}
            {{- if $inst.enabled }}
            {{- include "tekton-events-relay.notifierVolumeMounts" (dict "provider" $provider "instance" $inst) | nindent 12 }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- if and .Values.config.server.auth.enabled .Values.config.server.auth.secret (include "tekton-events-relay.hasRef" .Values.config.server.auth.secret) }}
            - mountPath: /etc/secrets/server/auth
              name: server-auth-secret
              readOnly: true
            {{- end }}
            {{- if and .Values.config.store.valkey.password (include "tekton-events-relay.hasRef" .Values.config.store.valkey.password) (include "tekton-events-relay.refName" .Values.config.store.valkey.password) }}
            - mountPath: /etc/secrets/valkey/default
              name: valkey-default-secret
              readOnly: true
            {{- end }}
            {{- range $provider, $instances := .Values.config.scm }}
            {{- range $inst := $instances }}
            {{- range $action := $inst.actions }}
            {{- if $action.templateRef }}
            - mountPath: /etc/templates/{{ $action.templateRef.configmapName }}
              name: tpl-{{ $action.templateRef.configmapName }}
              readOnly: true
            {{- end }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- range $provider, $instances := .Values.config.notifiers }}
            {{- range $inst := $instances }}
            {{- if $inst.templateRef }}
            - mountPath: /etc/templates/{{ $inst.templateRef.configmapName }}
              name: tpl-{{ $inst.templateRef.configmapName }}
              readOnly: true
            {{- end }}
            {{- end }}
            {{- end }}
            - mountPath: /etc/templates
              name: templates
              readOnly: true
      {{- with .Values.dnsConfig }}
      dnsConfig:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      dnsPolicy: {{ .Values.dnsPolicy | default "ClusterFirst" }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      restartPolicy: Always
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      serviceAccountName: {{ include "tekton-events-relay.serviceAccountName" . }}
      # Must exceed config.server.shutdown_timeout_sec so in-flight events drain.
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - configMap:
            name: {{ include "tekton-events-relay.fullname" . }}-config
          name: config
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.config.dlq.enabled }}
        # Writable storage for the dead letter queue (readOnlyRootFilesystem).
        # emptyDir survives container restarts but not pod rescheduling; use a
        # PVC via extra manifests if stronger durability is needed.
        - name: dlq
          emptyDir:
            sizeLimit: {{ .Values.config.dlq.volumeSizeLimit }}
        {{- end }}
        {{- range $provider, $instances := .Values.config.scm }}
        {{- range $inst := $instances }}
        {{- if $inst.enabled }}
        {{- include "tekton-events-relay.scmVolumes" (dict "provider" $provider "instance" $inst) | nindent 8 }}
        {{- end }}
        {{- end }}
        {{- end }}
        {{- range $provider, $instances := .Values.config.notifiers }}
        {{- range $inst := $instances }}
        {{- if $inst.enabled }}
        {{- include "tekton-events-relay.notifierVolumes" (dict "provider" $provider "instance" $inst) | nindent 8 }}
        {{- end }}
        {{- end }}
        {{- end }}
        {{- if and .Values.config.server.auth.enabled .Values.config.server.auth.secret (include "tekton-events-relay.hasRef" .Values.config.server.auth.secret) }}
        {{- include "tekton-events-relay.valueFromVolume" (dict "name" "server-auth-secret" "field" .Values.config.server.auth.secret) | nindent 8 }}
        {{- end }}
        {{- if and .Values.config.store.valkey.password (include "tekton-events-relay.hasRef" .Values.config.store.valkey.password) (include "tekton-events-relay.refName" .Values.config.store.valkey.password) }}
        {{- include "tekton-events-relay.valueFromVolume" (dict "name" "valkey-default-secret" "field" .Values.config.store.valkey.password) | nindent 8 }}
        {{- end }}
        {{- range $provider, $instances := .Values.config.scm }}
        {{- range $inst := $instances }}
        {{- range $action := $inst.actions }}
        {{- if $action.templateRef }}
        - configMap:
            name: {{ $action.templateRef.configmapName }}
          name: tpl-{{ $action.templateRef.configmapName }}
        {{- end }}
        {{- end }}
        {{- end }}
        {{- end }}
        {{- range $provider, $instances := .Values.config.notifiers }}
        {{- range $inst := $instances }}
        {{- if $inst.templateRef }}
        - configMap:
            name: {{ $inst.templateRef.configmapName }}
          name: tpl-{{ $inst.templateRef.configmapName }}
        {{- end }}
        {{- end }}
        {{- end }}
        - configMap:
            name: {{ include "tekton-events-relay.fullname" . }}-templates
          name: templates
