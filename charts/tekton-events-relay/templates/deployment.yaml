        {{- end }}
        {{- end }}
        {{- end }}
        {{- range $inst := .Values.config.scm.gitea }}
        {{- range $action := $inst.actions }}
        {{- if $action.templateRef }}
        - configMap:
            name: {{ $action.templateRef.configmapName }}
          name: tpl-{{ $action.templateRef.configmapName }}
        {{- end }}
        {{- end }}
        {{- end }}
        {{- range $inst := .Values.config.scm.sourcehut }}
        {{- range $action := $inst.actions }}
        {{- if $action.templateRef }}
        - configMap:
            name: {{ $action.templateRef.configmapName }}
          name: tpl-{{ $action.templateRef.configmapName }}
        {{- end }}
        {{- end }}
        {{- end }}
        {{- range $inst := .Values.config.scm.bitbucket }}
        {{- range $action := $inst.actions }}
        {{- if $action.templateRef }}
        - configMap:
            name: {{ $action.templateRef.configmapName }}
          name: tpl-{{ $action.templateRef.configmapName }}
        {{- end }}
        {{- end }}
        {{- end }}
        {{- range $inst := .Values.config.scm.azure_devops }}
        {{- range $action := $inst.actions }}
        {{- if $action.templateRef }}
        - configMap:
