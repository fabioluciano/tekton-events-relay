        {{- end }}
        {{- end }}
        {{- range $inst := .Values.config.notifiers.pagerduty }}
        {{- if and $inst.enabled $inst.secretRef }}
        - name: pagerduty-{{ $inst.name }}-secret
          secret:
            secretName: {{ $inst.secretRef.secretName }}
        {{- end }}
        {{- end }}
        {{- range $inst := .Values.config.notifiers.datadog }}
        {{- if and $inst.enabled $inst.secretRef }}
        - name: datadog-{{ $inst.name }}-secret
          secret:
            secretName: {{ $inst.secretRef.secretName }}
        {{- end }}
        {{- end }}
        {{- range $inst := .Values.config.notifiers.grafana }}
        {{- if and $inst.enabled $inst.secretRef }}
        - name: grafana-{{ $inst.name }}-secret
          secret:
            secretName: {{ $inst.secretRef.secretName }}
        {{- end }}
        {{- end }}
        {{- range $inst := .Values.config.notifiers.sentry }}
        {{- if and $inst.enabled $inst.secretRef }}
