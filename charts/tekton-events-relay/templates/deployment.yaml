apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    {{- include "tekton-events-relay.annotations" . | nindent 4 }}
    email: "{{ .Values.email | default "platform@example.com" }}"
    owner: "{{ .Values.owner | default "platform-team" }}"
  labels:
    {{- include "tekton-events-relay.labels" . | nindent 4 }}
    owner: "{{ .Values.owner | default "platform-team" }}"
  name: {{ include "tekton-events-relay.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "tekton-events-relay.selectorLabels" . | nindent 6 }}
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      annotations:
        {{- include "tekton-events-relay.annotations" . | nindent 8 }}
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        container.apparmor.security.beta.kubernetes.io/receiver: runtime/default
        container.seccomp.security.alpha.kubernetes.io/pod: runtime/default
        email: "{{ .Values.email | default "platform@example.com" }}"
        owner: "{{ .Values.owner | default "platform-team" }}"
      {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "tekton-events-relay.selectorLabels" . | nindent 8 }}
        owner: "{{ .Values.owner | default "platform-team" }}"
    spec:
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      containers:
        - args:
            - "--config"
            - "/etc/tekton-events-relay/config.{{ .Values.configFormat | default "toml" }}"
          envFrom:
            - secretRef:
                name: {{ include "tekton-events-relay.secretName" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          name: receiver
          ports:
            - containerPort: {{ .Values.service.targetPort }}
              name: http
              protocol: TCP
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
          volumeMounts:
            - mountPath: /etc/tekton-events-relay
              name: config
              readOnly: true
      dnsConfig:
        options:
          - name: ndots
            value: "2"
          - name: edns0
      dnsPolicy: ClusterFirst
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: Always
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      serviceAccountName: {{ include "tekton-events-relay.serviceAccountName" . }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - configMap:
            name: {{ include "tekton-events-relay.fullname" . }}-config
          name: config
