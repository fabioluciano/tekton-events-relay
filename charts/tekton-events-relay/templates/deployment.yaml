{{- include "tekton-events-relay.validateStore" . -}}
{{- include "tekton-events-relay.validateEmbeddedValkey" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    {{- include "tekton-events-relay.annotations" . | nindent 4 }}
    email: "{{ .Values.email | default "platform@example.com" }}"
    owner: "{{ .Values.owner | default "platform-team" }}"
  labels:
    {{- include "tekton-events-relay.labels" . | nindent 4 }}
    owner: "{{ .Values.owner | default "platform-team" }}"
  name: {{ include "tekton-events-relay.fullname" . }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "tekton-events-relay.selectorLabels" . | nindent 6 }}
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      annotations:
        {{- include "tekton-events-relay.annotations" . | nindent 8 }}
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        email: "{{ .Values.email | default "platform@example.com" }}"
        owner: "{{ .Values.owner | default "platform-team" }}"
      {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "tekton-events-relay.selectorLabels" . | nindent 8 }}
        owner: "{{ .Values.owner | default "platform-team" }}"
    spec:
      affinity:
        nodeAffinity:
          {{- toYaml .Values.affinity.nodeAffinity | nindent 10 }}
        {{- if eq (.Values.affinity.mode | default "soft") "hard" }}
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  {{- include "tekton-events-relay.selectorLabels" . | nindent 18 }}
              topologyKey: kubernetes.io/hostname
        {{- else }}
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "tekton-events-relay.selectorLabels" . | nindent 20 }}
                topologyKey: kubernetes.io/hostname
              weight: 100
        {{- end }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      containers:
        - args:
            - "--config"
            - "/etc/tekton-events-relay/config.yaml"
          {{- if or .Values.resources.limits.memory .Values.extraEnv }}
          env:
            {{- if .Values.resources.limits.memory }}
            # GOMEMLIMIT keeps the Go GC inside the container memory limit.
            # Derived from the actual limit at runtime (bytes), so it never
            # drifts when resources change.
            - name: GOMEMLIMIT
              valueFrom:
                resourceFieldRef:
                  containerName: receiver
                  resource: limits.memory
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          name: receiver
          ports:
            - containerPort: {{ .Values.service.targetPort }}
              name: http
              protocol: TCP
            {{- if .Values.config.server.metrics_addr }}
            - containerPort: {{ .Values.config.server.metrics_addr | trimPrefix ":" | atoi }}
              name: metrics
              protocol: TCP
            {{- end }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
          volumeMounts:
            - mountPath: /etc/tekton-events-relay
              name: config
              readOnly: true
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- if .Values.config.dlq.enabled }}
            - mountPath: /var/lib/tekton-events-relay
              name: dlq
            {{- end }}
            {{- range $inst := .Values.config.scm.github }}
            {{- if and $inst.enabled $inst.auth $inst.auth.secretRef }}
            - mountPath: /etc/secrets/github/{{ $inst.name }}
              name: github-{{ $inst.name }}-secret
              readOnly: true
            {{- end }}
            {{- if and $inst.enabled $inst.auth $inst.auth.private_key_secret_name }}
            - mountPath: /etc/github-app/{{ $inst.name }}
              name: github-{{ $inst.name }}-app-key
              readOnly: true
            {{- end }}
            {{- end }}
            {{- range $inst := .Values.config.scm.gitlab }}
            {{- if and $inst.enabled $inst.auth $inst.auth.secretRef }}
            - mountPath: /etc/secrets/gitlab/{{ $inst.name }}
              name: gitlab-{{ $inst.name }}-secret
              readOnly: true
            {{- end }}
            {{- if and $inst.enabled $inst.auth $inst.auth.oauth2 }}
            - mountPath: /etc/secrets/gitlab/{{ $inst.name }}
              name: gitlab-{{ $inst.name }}-oauth2-secret
              readOnly: true
            {{- end }}
            {{- end }}
            {{- range $inst := .Values.config.scm.bitbucket }}
            {{- if and $inst.enabled $inst.auth }}
            {{- if or $inst.auth.username_secretRef $inst.auth.app_password_secretRef $inst.auth.secretRef }}
            - mountPath: /etc/secrets/bitbucket/{{ $inst.name }}
              name: bitbucket-{{ $inst.name }}-secret
              readOnly: true
            {{- end }}
            {{- if $inst.auth.oauth2 }}
            - mountPath: /etc/secrets/bitbucket/{{ $inst.name }}
              name: bitbucket-{{ $inst.name }}-oauth2-secret
              readOnly: true
            {{- end }}
            {{- end }}
            {{- end }}
            {{- range $inst := .Values.config.scm.azure_devops }}
            {{- if and $inst.enabled $inst.secretRef }}
            - mountPath: /etc/secrets/azure/{{ $inst.name }}
              name: azure-{{ $inst.name }}-secret
              readOnly: true
            {{- end }}
            {{- end }}
            {{- range $inst := .Values.config.scm.gitea }}
            {{- if and $inst.enabled $inst.auth $inst.auth.secretRef }}
            - mountPath: /etc/secrets/gitea/{{ $inst.name }}
              name: gitea-{{ $inst.name }}-secret
              readOnly: true
            {{- end }}
            {{- if and $inst.enabled $inst.auth $inst.auth.oauth2 }}
            - mountPath: /etc/secrets/gitea/{{ $inst.name }}
              name: gitea-{{ $inst.name }}-oauth2-secret
              readOnly: true
            {{- end }}
            {{- end }}
            {{- range $inst := .Values.config.scm.sourcehut }}
            {{- if and $inst.enabled $inst.auth $inst.auth.secretRef }}
            - mountPath: /etc/secrets/sourcehut/{{ $inst.name }}
              name: sourcehut-{{ $inst.name }}-secret
              readOnly: true
            {{- end }}
            {{- end }}
            {{- range $inst := .Values.config.notifiers.slack }}
            {{- if and $inst.enabled (or $inst.secretRef (and $inst.bot_token $inst.bot_token.secretRef)) }}
            - mountPath: /etc/secrets/slack/{{ $inst.name }}
              name: slack-{{ $inst.name }}-secret
              readOnly: true
            {{- end }}
            {{- end }}
            {{- range $inst := .Values.config.notifiers.teams }}
            {{- if and $inst.enabled $inst.secretRef }}
            - mountPath: /etc/secrets/teams/{{ $inst.name }}
              name: teams-{{ $inst.name }}-secret
              readOnly: true
            {{- end }}
            {{- end }}
            {{- range $inst := .Values.config.notifiers.discord }}
            {{- if and $inst.enabled (or $inst.secretRef (and $inst.bot_token $inst.bot_token.secretRef)) }}
            - mountPath: /etc/secrets/discord/{{ $inst.name }}
              name: discord-{{ $inst.name }}-secret
              readOnly: true
            {{- end }}
            {{- end }}
            {{- range $inst := .Values.config.notifiers.pagerduty }}
            {{- if and $inst.enabled $inst.secretRef }}
            - mountPath: /etc/secrets/pagerduty/{{ $inst.name }}
              name: pagerduty-{{ $inst.name }}-secret
              readOnly: true
            {{- end }}
            {{- end }}
            {{- range $inst := .Values.config.notifiers.datadog }}
            {{- if and $inst.enabled $inst.secretRef }}
            - mountPath: /etc/secrets/datadog/{{ $inst.name }}
              name: datadog-{{ $inst.name }}-secret
              readOnly: true
            {{- end }}
            {{- end }}
            {{- range $inst := .Values.config.notifiers.grafana }}
            {{- if and $inst.enabled $inst.secretRef }}
            - mountPath: /etc/secrets/grafana/{{ $inst.name }}
              name: grafana-{{ $inst.name }}-secret
              readOnly: true
            {{- end }}
            {{- end }}
            {{- range $inst := .Values.config.notifiers.email }}
            {{- if and $inst.enabled $inst.secretRef }}
            - mountPath: /etc/secrets/email/{{ $inst.name }}
              name: email-{{ $inst.name }}-secret
              readOnly: true
            {{- end }}
            {{- end }}
            {{- range $inst := .Values.config.notifiers.sentry }}
            {{- if and $inst.enabled $inst.secretRef }}
            - mountPath: /etc/secrets/sentry/{{ $inst.name }}
              name: sentry-{{ $inst.name }}-secret
              readOnly: true
            {{- end }}
            {{- end }}
            {{- range $inst := .Values.config.notifiers.webhook }}
            {{- if and $inst.enabled $inst.secretRef }}
            - mountPath: /etc/secrets/webhook/{{ $inst.name }}
              name: webhook-{{ $inst.name }}-secret
              readOnly: true
            {{- end }}
            {{- end }}
            {{- range $inst := .Values.config.scm.github }}
            {{- range $action := $inst.actions }}
            {{- if $action.templateRef }}
            - mountPath: /etc/templates/{{ $action.templateRef.configmapName }}
              name: tpl-{{ $action.templateRef.configmapName }}
              readOnly: true
            {{- end }}
            {{- end }}
            {{- end }}
            {{- range $inst := .Values.config.scm.gitlab }}
            {{- range $action := $inst.actions }}
            {{- if $action.templateRef }}
            - mountPath: /etc/templates/{{ $action.templateRef.configmapName }}
              name: tpl-{{ $action.templateRef.configmapName }}
              readOnly: true
            {{- end }}
            {{- end }}
            {{- end }}
            {{- range $inst := .Values.config.scm.gitea }}
            {{- range $action := $inst.actions }}
            {{- if $action.templateRef }}
            - mountPath: /etc/templates/{{ $action.templateRef.configmapName }}
              name: tpl-{{ $action.templateRef.configmapName }}
              readOnly: true
            {{- end }}
            {{- end }}
            {{- end }}
            {{- range $inst := .Values.config.scm.sourcehut }}
            {{- range $action := $inst.actions }}
            {{- if $action.templateRef }}
            - mountPath: /etc/templates/{{ $action.templateRef.configmapName }}
              name: tpl-{{ $action.templateRef.configmapName }}
              readOnly: true
            {{- end }}
            {{- end }}
            {{- end }}
            {{- range $inst := .Values.config.scm.bitbucket }}
            {{- range $action := $inst.actions }}
            {{- if $action.templateRef }}
            - mountPath: /etc/templates/{{ $action.templateRef.configmapName }}
              name: tpl-{{ $action.templateRef.configmapName }}
              readOnly: true
            {{- end }}
            {{- end }}
            {{- end }}
            {{- range $inst := .Values.config.scm.azure_devops }}
            {{- range $action := $inst.actions }}
            {{- if $action.templateRef }}
            - mountPath: /etc/templates/{{ $action.templateRef.configmapName }}
              name: tpl-{{ $action.templateRef.configmapName }}
              readOnly: true
            {{- end }}
            {{- end }}
            {{- end }}
            {{- range $inst := .Values.config.notifiers.slack }}
            {{- if and $inst.templateRef }}
            - mountPath: /etc/templates/{{ $inst.templateRef.configmapName }}
              name: tpl-{{ $inst.templateRef.configmapName }}
              readOnly: true
            {{- end }}
            {{- end }}
            {{- range $inst := .Values.config.notifiers.teams }}
            {{- if and $inst.templateRef }}
            - mountPath: /etc/templates/{{ $inst.templateRef.configmapName }}
              name: tpl-{{ $inst.templateRef.configmapName }}
              readOnly: true
            {{- end }}
            {{- end }}
            {{- range $inst := .Values.config.notifiers.discord }}
            {{- if and $inst.templateRef }}
            - mountPath: /etc/templates/{{ $inst.templateRef.configmapName }}
              name: tpl-{{ $inst.templateRef.configmapName }}
              readOnly: true
            {{- end }}
            {{- end }}
            {{- range $inst := .Values.config.notifiers.grafana }}
            {{- if and $inst.templateRef }}
            - mountPath: /etc/templates/{{ $inst.templateRef.configmapName }}
              name: tpl-{{ $inst.templateRef.configmapName }}
              readOnly: true
            {{- end }}
            {{- end }}
            {{- range $inst := .Values.config.notifiers.email }}
            {{- if and $inst.templateRef }}
            - mountPath: /etc/templates/{{ $inst.templateRef.configmapName }}
              name: tpl-{{ $inst.templateRef.configmapName }}
              readOnly: true
            {{- end }}
            {{- end }}
            {{- range $inst := .Values.config.notifiers.webhook }}
            {{- if and $inst.templateRef }}
            - mountPath: /etc/templates/{{ $inst.templateRef.configmapName }}
              name: tpl-{{ $inst.templateRef.configmapName }}
              readOnly: true
            {{- end }}
            {{- end }}
            - mountPath: /etc/templates
              name: templates
              readOnly: true
      {{- with .Values.dnsConfig }}
      dnsConfig:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      dnsPolicy: {{ .Values.dnsPolicy | default "ClusterFirst" }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      restartPolicy: Always
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      serviceAccountName: {{ include "tekton-events-relay.serviceAccountName" . }}
      # Must exceed config.server.shutdown_timeout_sec so in-flight events drain.
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - configMap:
            name: {{ include "tekton-events-relay.fullname" . }}-config
          name: config
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.config.dlq.enabled }}
        # Writable storage for the dead letter queue (readOnlyRootFilesystem).
        # emptyDir survives container restarts but not pod rescheduling; use a
        # PVC via extra manifests if stronger durability is needed.
        - name: dlq
          emptyDir:
            sizeLimit: {{ .Values.config.dlq.volumeSizeLimit }}
        {{- end }}
        {{- range $inst := .Values.config.scm.github }}
        {{- if and $inst.enabled $inst.auth $inst.auth.secretRef }}
        - name: github-{{ $inst.name }}-secret
          secret:
            secretName: {{ $inst.auth.secretRef.secretName }}
        {{- end }}
        {{- if and $inst.enabled $inst.auth $inst.auth.private_key_secret_name }}
        - name: github-{{ $inst.name }}-app-key
          secret:
            secretName: {{ $inst.auth.private_key_secret_name }}
            items:
              - key: {{ $inst.auth.private_key_secret_key | default "private-key.pem" }}
                path: private-key.pem
        {{- end }}
        {{- end }}
        {{- range $inst := .Values.config.scm.gitlab }}
        {{- if and $inst.enabled $inst.auth $inst.auth.secretRef }}
        - name: gitlab-{{ $inst.name }}-secret
          secret:
            secretName: {{ $inst.auth.secretRef.secretName }}
        {{- end }}
        {{- if and $inst.enabled $inst.auth $inst.auth.oauth2 $inst.auth.oauth2.client_id_secret_name }}
        - name: gitlab-{{ $inst.name }}-oauth2-secret
          secret:
            secretName: {{ $inst.auth.oauth2.client_id_secret_name }}
        {{- end }}
        {{- end }}
        {{- range $inst := .Values.config.scm.bitbucket }}
        {{- if and $inst.enabled $inst.auth $inst.auth.username_secretRef }}
        - name: bitbucket-{{ $inst.name }}-secret
          secret:
            secretName: {{ $inst.auth.username_secretRef.secretName }}
        {{- end }}
        {{- if and $inst.enabled $inst.auth $inst.auth.oauth2 $inst.auth.oauth2.client_id_secret_name }}
        - name: bitbucket-{{ $inst.name }}-oauth2-secret
          secret:
            secretName: {{ $inst.auth.oauth2.client_id_secret_name }}
        {{- end }}
        {{- if and $inst.enabled $inst.auth $inst.auth.secretRef }}
        - name: bitbucket-{{ $inst.name }}-secret
          secret:
            secretName: {{ $inst.auth.secretRef.secretName }}
        {{- end }}
        {{- end }}
        {{- range $inst := .Values.config.scm.azure_devops }}
        {{- if and $inst.enabled $inst.secretRef }}
        - name: azure-{{ $inst.name }}-secret
          secret:
            secretName: {{ $inst.secretRef.secretName }}
        {{- end }}
        {{- end }}
        {{- range $inst := .Values.config.scm.gitea }}
        {{- if and $inst.enabled $inst.auth $inst.auth.secretRef }}
        - name: gitea-{{ $inst.name }}-secret
          secret:
            secretName: {{ $inst.auth.secretRef.secretName }}
        {{- end }}
        {{- if and $inst.enabled $inst.auth $inst.auth.oauth2 $inst.auth.oauth2.client_id_secret_name }}
        - name: gitea-{{ $inst.name }}-oauth2-secret
          secret:
            secretName: {{ $inst.auth.oauth2.client_id_secret_name }}
        {{- end }}
        {{- end }}
        {{- range $inst := .Values.config.scm.sourcehut }}
