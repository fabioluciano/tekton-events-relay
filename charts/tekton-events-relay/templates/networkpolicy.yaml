{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  annotations:
    {{- include "tekton-events-relay.annotations" . | nindent 4 }}
  labels:
    {{- include "tekton-events-relay.labels" . | nindent 4 }}
  name: {{ include "tekton-events-relay.fullname" . }}
spec:
  egress:
    {{- with .Values.networkPolicy.extraEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    # Allow DNS
    - ports:
        - port: 53
          protocol: UDP
      to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
    # Allow outbound HTTPS and HTTP for:
    # - SCM API endpoints (GitHub, GitLab, Bitbucket, Azure DevOps, Gitea, SourceHut)
    # - Webhook URLs (Slack, Discord, Teams, PagerDuty, Datadog)
    # Note: Restrict to specific CIDR blocks in production if SCM API endpoints are known
    - ports:
        - port: 443
          protocol: TCP
    - ports:
        - port: 80
          protocol: TCP
    {{- if .Values.config.tracing.endpoint }}
    # Allow OTLP gRPC and HTTP for tracing
    - ports:
        - port: 4317
          protocol: TCP
        - port: 4318
          protocol: TCP
    {{- end }}
    {{- if eq .Values.config.store.backend "valkey" }}
    # Allow outbound to the Valkey shared state store
    - ports:
        - port: {{ .Values.networkPolicy.valkeyPort }}
          protocol: TCP
    {{- end }}
    {{- if eq .Values.config.store.backend "olric" }}
    # Allow pod-to-pod olric traffic (data + memberlist gossip)
    - to:
        - podSelector:
            matchLabels:
              {{- include "tekton-events-relay.selectorLabels" . | nindent 14 }}
      ports:
        - port: {{ .Values.config.store.olric.bind_port }}
          protocol: TCP
        - port: {{ .Values.config.store.olric.memberlist_port }}
          protocol: TCP
        - port: {{ .Values.config.store.olric.memberlist_port }}
          protocol: UDP
    {{- end }}
    {{- range .Values.config.notifiers.email }}
    {{- if .enabled }}
    # Allow outbound SMTP for the "{{ .name }}" email notifier
    - ports:
        - port: {{ .port | default 587 }}
          protocol: TCP
    {{- end }}
    {{- end }}
  ingress:
    {{- if .Values.config.server.metrics_addr }}
    # Allow Prometheus scraping of the dedicated metrics port
    - ports:
        - port: {{ .Values.config.server.metrics_addr | trimPrefix ":" | atoi }}
          protocol: TCP
      {{- with .Values.networkPolicy.metricsFrom }}
      from:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- end }}
    {{- with .Values.networkPolicy.extraIngress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    # Allow traffic from same namespace
    - from:
        - podSelector: {}
      ports:
        - port: {{ .Values.service.targetPort }}
          protocol: TCP
    # Allow traffic from Tekton Pipelines namespace (events controller)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: tekton-pipelines
      ports:
        - port: {{ .Values.service.targetPort }}
          protocol: TCP
    {{- if eq .Values.config.store.backend "olric" }}
    # Allow pod-to-pod olric traffic (data + memberlist gossip)
    - from:
        - podSelector:
            matchLabels:
              {{- include "tekton-events-relay.selectorLabels" . | nindent 14 }}
      ports:
        - port: {{ .Values.config.store.olric.bind_port }}
          protocol: TCP
        - port: {{ .Values.config.store.olric.memberlist_port }}
          protocol: TCP
        - port: {{ .Values.config.store.olric.memberlist_port }}
          protocol: UDP
    {{- end }}
  podSelector:
    matchLabels:
      {{- include "tekton-events-relay.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
{{- end }}
