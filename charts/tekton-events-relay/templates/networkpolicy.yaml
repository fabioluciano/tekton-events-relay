apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  annotations:
    {{- include "tekton-events-relay.annotations" . | nindent 4 }}
  labels:
    {{- include "tekton-events-relay.labels" . | nindent 4 }}
  name: {{ include "tekton-events-relay.fullname" . }}
spec:
  egress:
    # Allow DNS
    - ports:
        - port: 53
          protocol: UDP
      to:
        - namespaceSelector:
            matchLabels:
              name: kube-system
    # Allow outbound HTTPS for SCM providers
    - ports:
        - port: 443
          protocol: TCP
      to:
        - namespaceSelector: {}
    # Allow outbound HTTP
    - ports:
        - port: 80
          protocol: TCP
      to:
        - namespaceSelector: {}
  ingress:
    # Allow traffic from same namespace
    - from:
        - podSelector: {}
      ports:
        - port: {{ .Values.service.targetPort }}
          protocol: TCP
  podSelector:
    matchLabels:
      {{- include "tekton-events-relay.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
