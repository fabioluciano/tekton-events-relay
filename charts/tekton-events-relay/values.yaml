# Default values for tekton-events-relay.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# NOTE: with the default config.store.backend "memory", deduplication and
# event accumulation state is per-pod — running more than one replica can
# produce duplicate or fragmented notifications. The chart refuses to
# install more than 1 replica with the memory store; set config.store.backend
# to "valkey" or "olric" before scaling beyond 1 replica.
replicaCount: 1

# Escape hatch for the multi-replica × memory-store safety check. The chart
# refuses to install replicaCount > 1 (or HPA) with config.store.backend=memory
# because per-pod state causes duplicate/fragmented notifications. Only set
# this to true if you accept that behavior.
unsafe:
  # -- Allow multiple replicas with the per-pod memory store (NOT recommended)
  allowMemoryStoreWithMultipleReplicas: false

# -- Seconds allowed for graceful shutdown; keep above config.server.shutdown_timeout_sec
terminationGracePeriodSeconds: 40

# -- PriorityClass for the relay pods (empty = cluster default)
priorityClassName: ""

# -- Topology spread constraints (e.g. spread across zones)
topologySpreadConstraints: []
#  - maxSkew: 1
#    topologyKey: topology.kubernetes.io/zone
#    whenUnsatisfiable: ScheduleAnyway
#    labelSelector:
#      matchLabels:
#        app.kubernetes.io/name: tekton-events-relay

# -- Extra environment variables for the receiver container
extraEnv: []
#  - name: HTTPS_PROXY
#    value: http://proxy.corp.example.com:3128

# -- Extra volumes (e.g. TLS certificates for config.server.tls)
extraVolumes: []
#  - name: server-tls
#    secret:
#      secretName: relay-tls

# -- Extra volume mounts for the receiver container
extraVolumeMounts: []
#  - name: server-tls
#    mountPath: /etc/tls
#    readOnly: true

image:
  repository: ghcr.io/fabioluciano/tekton-events-relay
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Common labels to add to all resources
commonLabels: {}

# Common annotations to add to all resources
commonAnnotations: {}

serviceAccount:
  # RBAC (Role-Based Access Control) configuration for the application
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""
  # Auto-mount service account token
  automountServiceAccountToken: false

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  appArmorProfile:
    type: RuntimeDefault
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  capabilities:
    drop:
      - ALL
  appArmorProfile:
    type: RuntimeDefault
  seccompProfile:
    type: RuntimeDefault

service:
  type: ClusterIP
  port: 80
  targetPort: 8080
  annotations: {}

# Resource management
# Memory scaling: For higher throughput, increase memory requests proportionally
# Consider 128Mi/256Mi for high-volume deployments
resources:
  limits:
    cpu: 500m
    memory: 256Mi
    ephemeral-storage: 256Mi
  requests:
    cpu: 100m
    memory: 64Mi
    ephemeral-storage: 100Mi

startupProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 0
  periodSeconds: 5
  failureThreshold: 30

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /readyz
    port: http
  periodSeconds: 5

nodeSelector: {}

tolerations: []

# Pod anti-affinity configuration
# mode: "soft" (default) uses preferredDuringSchedulingIgnoredDuringExecution - scheduler will try to
#        spread pods across nodes but will allow co-location if necessary (works in dev/test clusters)
# mode: "hard" uses requiredDuringSchedulingIgnoredDuringExecution - scheduler must guarantee pod
#        separation across nodes (for production deployments requiring strict node isolation)
affinity:
  mode: soft
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - tekton-events-relay
          topologyKey: kubernetes.io/hostname
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 50
        preference:
          matchExpressions:
            - key: node-role.kubernetes.io/worker
              operator: In
              values:
                - "true"

# Owner and contact information
owner: "platform-team"
email: "platform@example.com"

# Pod Disruption Budget
# Rendered only when replicaCount > 1 or autoscaling is enabled.
# Set exactly one of minAvailable / maxUnavailable (maxUnavailable preferred:
# it adapts to replica count changes without manual edits).
podDisruptionBudget:
  # -- Create a PodDisruptionBudget
  enabled: true
  # -- Maximum pods that may be unavailable during voluntary disruptions
  maxUnavailable: 1
  # -- Alternative to maxUnavailable (leave empty to use maxUnavailable)
  minAvailable: ""

# Horizontal Pod Autoscaler
# NOTE (Production Guidance): Enable HPA (horizontal pod autoscaling) only with metrics-server deployed and resource requests properly configured.
# Monitor initial deployments without HPA to establish baseline metrics before enabling auto-scaling.
autoscaling:
  enabled: false
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 75
  targetMemoryUtilizationPercentage: 80

config:
  # -- HTTP server configuration
  server:
    # -- Server listen address and port
    addr: ":8080"
    # -- Metrics server address (empty to use main server)
    metrics_addr: "" # optional: separate port like ":9090"
    # -- HTTP read timeout in seconds
    read_timeout_sec: 10
    # -- HTTP write timeout in seconds
    write_timeout_sec: 10
    # -- Graceful shutdown timeout in seconds
    shutdown_timeout_sec: 30
    # -- Maximum request body size in bytes
    max_body_size: 1048576 # 1MB default

    # Rate limiting (optional, default OFF)
    # -- Rate limiting configuration
    rate_limit:
      enabled: false
      # -- Maximum requests per second
      requests_per_second: 100.0
      # -- Maximum burst size for rate limiter
      burst: 200

    # Authentication (optional, default OFF)
    # -- Webhook authentication configuration
    auth:
      enabled: false
      type: "hmac-sha256" # or "bearer"
      # -- Reference to webhook secret for HMAC validation
      secret_file: "${WEBHOOK_SECRET}"
      # -- Replay protection: require an X-Webhook-Timestamp header (unix
      # seconds) within timestamp_tolerance of the server clock
      validate_timestamp: false
      # -- Accepted clock skew for replay protection (Go duration format)
      timestamp_tolerance: 5m

    # Native TLS (optional). When both files are set the receiver serves
    # HTTPS directly; otherwise TLS is expected to terminate at the ingress.
    # Mount the certificate via extraVolumes/extraVolumeMounts or a custom
    # patch, then point these paths at it.
    # -- Native TLS configuration for the receiver endpoint
    tls:
      # -- Path to the PEM certificate (empty = plain HTTP)
      cert_file: ""
      # -- Path to the PEM private key (empty = plain HTTP)
      key_file: ""
  # -- Base URL for the Tekton dashboard (used in notification links)
  dashboard_url: "https://tekton.company.example.com"
  # -- Size of the deduplication cache to prevent duplicate notifications
  dedupe_size: 10000

  # -- Per-handler execution deadline; one slow provider cannot stall the
  # whole event dispatch (Go duration format)
  handler_timeout: 10s

  # Outbound HTTP retry policy applied to all notifiers and SCM clients.
  # Uses exponential backoff with jitter; HTTP 429/503 Retry-After headers
  # are honored (capped at max_backoff). 4xx responses (except 429) never retry.
  # -- Outbound HTTP retry configuration
  retry:
    # -- Total attempts including the first request
    max_attempts: 4
    # -- First backoff delay (Go duration format)
    initial_backoff: 250ms
    # -- Backoff ceiling (Go duration format)
    max_backoff: 30s

  # State backend shared by deduplication and the accumulator.
  # IMPORTANT: the default "memory" backend keeps state per pod — it is lost
  # on restart and NOT shared between replicas, so deduplication and event
  # accumulation are only fully reliable with replicaCount: 1. To run
  # multiple replicas (or enable autoscaling), use "valkey" or "olric":
  #   valkey - shared external RESP server (Valkey, KeyDB, ...). A small
  #            instance (64Mi, no persistence) is enough.
  #   olric  - embedded distributed cache: relay pods share state between
  #            themselves via gossip, no extra deployment required.
  # -- State backend configuration (dedupe + accumulator)
  store:
    # -- Backend: memory, valkey or olric
    backend: memory
    # -- Entry lifetime on remote backends (Go duration format)
    ttl: 1h
    # -- Valkey backend settings (backend: valkey)
    valkey:
      # -- Deploy an embedded Valkey instance as a subchart (disabled by default;
      # use this for single-cluster dev/test setups; for production, use an
      # external Valkey/KeyDB and set address directly)
      embedded:
        enabled: false
      # -- Valkey server address (host:port); required when backend=valkey
      # and embedded is disabled. When embedded.enabled is true, this is
      # auto-populated with the embedded service address.
      address: ""
      # -- Reference to a Kubernetes Secret containing the Valkey password (optional)
      password_secretRef:
        secretName: ""
        secretKey: password
      # -- Valkey logical database
      db: 0
      # -- Prefix applied to all keys
      key_prefix: "tekton-events-relay"
    # -- Olric embedded backend settings (backend: olric)
    olric:
      # -- Port for olric data traffic between relay pods
      bind_port: 3320
      # -- Port for memberlist gossip between relay pods (TCP+UDP)
      memberlist_port: 3322
      # -- Peer list override; defaults to the chart's headless gossip service
      peers: []

  # Dead letter queue: preserves events that failed with permanent errors
  # (expired token, repo not found, ...) instead of silently dropping them.
  # Inspect with GET /api/v1/dlq and reprocess with POST /api/v1/dlq/replay
  # (both protected by server.auth when enabled).
  # -- Dead letter queue configuration
  dlq:
    # -- Enable the dead letter queue
    enabled: false
    # -- JSONL file path (mounted as a writable emptyDir by the chart)
    path: /var/lib/tekton-events-relay/dlq.jsonl
    # -- Maximum file size in bytes before oldest entries are dropped
    max_size_bytes: 10485760
    # -- Size limit of the emptyDir volume backing the DLQ
    volumeSizeLimit: 32Mi

  # Logging configuration
  # -- Logging configuration
  logging:
    # -- Log level (debug, info, warn, error)
    level: "info" # debug, info, warn, error
    # Verbose options (only available when level=debug, otherwise config validation fails)
    # -- Verbose logging options
    verbose:
      # -- Include caller information in logs
      caller: false # Add caller info to logs
      # -- Log HTTP calls
      http_calls: false # Log outbound HTTP calls
      # -- Log event payloads
      payloads: false # Log full request/response payloads (sanitized)

  # -- Event filtering configuration
  filter:
    # -- Process TaskRun events
    allow_taskrun: true
    # -- Process PipelineRun events
    allow_pipelinerun: true
    # -- Process CustomRun events
    allow_customrun: false
    # -- Process EventListener events
    allow_eventlistener: false
    # -- Ignore unknown event types
    ignore_unknown: true

  # Pipeline Summary Accumulator (Feature 3)
  # Aggregates TaskRun events into single PR comment when PipelineRun completes
  # -- Event accumulation configuration (batch multiple events)
  accumulator:
    enabled: false # Enable accumulator
    # -- Time to live for accumulated events
    ttl: 30s # Time-to-live for buffered events
    # -- Maximum number of events to accumulate
    max_size: 100 # Maximum number of pipeline runs to track

  # -- OpenTelemetry tracing configuration
  tracing:
    # -- OTLP endpoint for trace export (e.g., "otel-collector:4318"). Empty = tracing disabled.
    endpoint: ""
    # -- Service name reported in traces
    service_name: "tekton-events-relay"
    # -- When false, uses HTTPS for OTLP export. Set to true for plaintext HTTP.
    insecure: false

  # SCM providers with action-based handlers
  scm:
    # -- GitHub SCM provider configuration
    github:
      - name: default
        # -- Enable or disable this SCM provider instance
        enabled: false
        # -- API base URL for the SCM provider
        base_url: "https://api.github.com"
        # Authentication: token OR GitHub App (mutually exclusive)
        # -- Webhook authentication configuration
        auth:
          # Token-based auth (recommended for simple setup):
          # -- Kubernetes Secret containing credentials
          secretRef:
            secretName: github-default-token # optional: defaults to /etc/secrets/github/default/token
            secretKey: token  # optional, defaults to "token"
          # GitHub App auth (for advanced features):
          # app_id: 123456
          # installation_id: 789012
          # Note: private key must be mounted at /etc/github-app/private-key.pem
          # Create secret: kubectl create secret generic github-app-private-key
          # --from-file=private-key.pem=path/to/private-key.pem
        actions:
          - name: commit-status
            # -- Action type (commit_status, check_run, pr_comment, issue_comment, discussion_comment, label, deployment_status)
            type: commit_status
            # -- Enable or disable this SCM provider instance
            enabled: false
            when: 'event.Resource == "pipelinerun"'
          # Feature 4: GitHub Check Runs - richer UI integration
          - name: check-run
            # -- Action type (commit_status, check_run, pr_comment, issue_comment, discussion_comment, label, deployment_status)
            type: check_run
            # -- Enable or disable this SCM provider instance
            enabled: false
            when: 'stateIn("success", "failure", "error")'
            template: |
              ## Build Result: {{.State}}
              **Run:** {{.RunName}}
              **Namespace:** {{.Namespace}}
              {{if .TargetURL}}[View Logs]({{.TargetURL}}){{end}}
            # OR reference a ConfigMap:
            # templateRef:
            #   configmapName: my-templates
            #   configmapKey: check-run.tmpl
          # Feature 5: Deployment Status - track deployments by environment
          - name: deployment-status
            # -- Action type (commit_status, check_run, pr_comment, issue_comment, discussion_comment, label, deployment_status)
            type: deployment_status
            # -- Enable or disable this SCM provider instance
            enabled: false
            # Environment is derived from event context/annotations at runtime
            when: 'stateIn("success", "failure")'
          - name: pr-comment
            # -- Action type (commit_status, check_run, pr_comment, issue_comment, discussion_comment, label, deployment_status)
            type: pr_comment
            # -- Enable or disable this SCM provider instance
            enabled: false
            when: 'stateIn("success", "failure")'
            # -- Comment mode: "create" posts a new comment per event;
            # "upsert" embeds an invisible marker and edits the existing
            # comment for the same run, making the action idempotent across
            # retries, restarts and multiple replicas.
            # Supported by GitHub, Gitea and Bitbucket Cloud.
            mode: create
            # Feature 6: Chat Notifier Templates - customizable Go templates
            template: |
              ## Pipeline {{.State}}
              **Run:** {{.RunName}}
              **Commit:** {{.CommitSHA}}
              {{if .TargetURL}}[View Results]({{.TargetURL}}){{end}}
          - name: issue-comment
            # -- Action type (commit_status, check_run, pr_comment, issue_comment, discussion_comment, label, deployment_status)
            type: issue_comment
            # -- Enable or disable this SCM provider instance
            enabled: false
            when: 'stateIn("failure", "error")'
            template: |
              Pipeline {{.Context}} finished with state: **{{.State}}**
              {{if .TargetURL}}[View Results]({{.TargetURL}}){{end}}
          - name: discussion-comment
            # -- Action type (commit_status, check_run, pr_comment, issue_comment, discussion_comment, label, deployment_status)
            type: discussion_comment
            # -- Enable or disable this SCM provider instance
            enabled: false
            when: 'stateIn("success", "failure")'
            template: |
              ## Pipeline {{.State}}
              **Run:** {{.RunName}}
              **Commit:** {{.CommitSHA}}
              {{if .TargetURL}}[View Results]({{.TargetURL}}){{end}}
            # OR reference a ConfigMap:
            # templateRef:
            #   configmapName: my-templates
            #   configmapKey: discussion-comment.tmpl
          - name: label
            # -- Action type (commit_status, check_run, pr_comment, issue_comment, discussion_comment, label, deployment_status)
            type: label
            # -- Enable or disable this SCM provider instance
            enabled: false
            when: 'event.Resource == "pipelinerun"'
            # -- Declarative label effect: add/remove lists with optional colors (hex without #)
            # Supports both old string format and new object format with color field
            labels:
              add:
                - name: "ci:passed"
                  color: "0e8a16"  # green - optional, omit for provider default
                - name: "ready-to-merge"
                  # color field omitted = provider uses default/random color
              remove:
                - name: "ci:failed"
                  # color field ignored on remove operations

    # -- GitLab SCM provider configuration
    gitlab:
      - name: cloud
        # -- Deployment model: 'saas' for gitlab.com, 'self-managed' for self-hosted.
        # This field is required when instance is enabled. Currently metadata-only but
        # enables future SaaS-specific behaviors (rate limiting, feature detection).
        variant: saas
        # -- Enable or disable this SCM provider instance
        enabled: false
        # -- API base URL for the SCM provider
        base_url: "https://gitlab.com/api/v4"
        # -- Authentication configuration (PAT or OAuth2, mutually exclusive)
        # auth:
        #   secretRef:
        #     secretName: gitlab-cloud-token
        #     secretKey: token
        #   oauth2:                               # OAuth2 client credentials
        #     client_id_secretRef:
        #       secretName: gitlab-oauth2-creds
        #       secretKey: client_id
        #     client_secret_secretRef:
        #       secretName: gitlab-oauth2-creds
        #       secretKey: client_secret
        #     token_url: "https://gitlab.com/oauth/token"
        # -- Actions to perform when events are received
        actions:
          - name: commit-status
            # -- Action type (commit_status, check_run, pr_comment, issue_comment, discussion_comment, label, deployment_status)
            type: commit_status
            # -- Enable or disable this SCM provider instance
            enabled: false
            when: ""
          - name: pr-comment
            # -- Action type (commit_status, check_run, pr_comment, issue_comment, discussion_comment, label, deployment_status)
            type: pr_comment
            # -- Enable or disable this SCM provider instance
            enabled: false
            when: 'stateIn("failure", "error")'
            template: |
              ## Pipeline {{.State}}
              **Run:** {{.RunName}}
              **Commit:** {{.CommitSHA}}
              {{if .TargetURL}}[View Results]({{.TargetURL}}){{end}}
            # OR reference a ConfigMap:
            # templateRef:
            #   configmapName: my-templates
            #   configmapKey: pr-comment.tmpl
          - name: issue-comment
            # -- Action type (commit_status, check_run, pr_comment, issue_comment, discussion_comment, label, deployment_status)
            type: issue_comment
            # -- Enable or disable this SCM provider instance
            enabled: false
            when: 'stateIn("failure", "error")'
            template: |
              Pipeline {{.Context}} finished with state: **{{.State}}**
              {{if .TargetURL}}[View Results]({{.TargetURL}}){{end}}
            # OR reference a ConfigMap:
            # templateRef:
            #   configmapName: my-templates
            #   configmapKey: issue-comment.tmpl
          - name: label
            # -- Action type (commit_status, check_run, pr_comment, issue_comment, discussion_comment, label, deployment_status)
            type: label
            # -- Enable or disable this SCM provider instance
            enabled: false
            when: ""
            # -- Declarative label effect: add/remove lists, Go-templated against the event
            labels:
              add:
                - '{{ if eq .State "success" }}pipeline::success{{ else }}pipeline::failed{{ end }}'
              remove:
                - '{{ if eq .State "success" }}pipeline::failed{{ else }}pipeline::success{{ end }}'
      - name: server
        # -- Deployment model: 'saas' for gitlab.com, 'self-managed' for self-hosted
        variant: self-managed
        # -- Enable or disable this SCM provider instance
        enabled: false
        # -- API base URL for the SCM provider
        base_url: "https://gitlab.company.example.com/api/v4"
        # -- Authentication configuration (PAT or OAuth2, mutually exclusive)
        # auth:
        #   secretRef:
        #     secretName: gitlab-server-token
        #     secretKey: token
        #   oauth2:                               # OAuth2 client credentials
        #     client_id_secretRef:
        #       secretName: gitlab-oauth2-creds
        #       secretKey: client_id
        #     client_secret_secretRef:
        #       secretName: gitlab-oauth2-creds
        #       secretKey: client_secret
        #     token_url: "https://gitlab.company.example.com/oauth/token"
        # -- Actions to perform when events are received
        actions:
          - name: commit-status
            # -- Action type (commit_status, check_run, pr_comment, issue_comment, discussion_comment, label, deployment_status)
            type: commit_status
            # -- Enable or disable this SCM provider instance
            enabled: false
            when: ""
          - name: pr-comment
            # -- Action type (commit_status, check_run, pr_comment, issue_comment, discussion_comment, label, deployment_status)
            type: pr_comment
            # -- Enable or disable this SCM provider instance
            enabled: false
            when: 'stateIn("failure", "error")'
            template: |
              ## Pipeline {{.State}}
              **Run:** {{.RunName}}
              **Commit:** {{.CommitSHA}}
              {{if .TargetURL}}[View Results]({{.TargetURL}}){{end}}
            # OR reference a ConfigMap:
            # templateRef:
            #   configmapName: my-templates
            #   configmapKey: pr-comment.tmpl
          - name: issue-comment
            # -- Action type (commit_status, check_run, pr_comment, issue_comment, discussion_comment, label, deployment_status)
            type: issue_comment
            # -- Enable or disable this SCM provider instance
            enabled: false
            when: 'stateIn("failure", "error")'
            template: |
              Pipeline {{.Context}} finished with state: **{{.State}}**
              {{if .TargetURL}}[View Results]({{.TargetURL}}){{end}}
            # OR reference a ConfigMap:
            # templateRef:
            #   configmapName: my-templates
            #   configmapKey: issue-comment.tmpl
          - name: label
            # -- Action type (commit_status, check_run, pr_comment, issue_comment, discussion_comment, label, deployment_status)
            type: label
            # -- Enable or disable this SCM provider instance
            enabled: false
            when: ""
            # -- Declarative label effect: add/remove lists, Go-templated against the event
            labels:
              add:
                - '{{ if eq .State "success" }}pipeline::success{{ else }}pipeline::failed{{ end }}'
              remove:
                - '{{ if eq .State "success" }}pipeline::failed{{ else }}pipeline::success{{ end }}'

    # -- Bitbucket SCM provider configuration
    bitbucket:
      - name: cloud
        # -- SCM variant (cloud or server)
        variant: cloud
        # -- Enable or disable this SCM provider instance
        enabled: false
        # -- Authentication configuration (variant=cloud: username/app_password or oauth2)
        # auth:
        #   username_secretRef:
        #     secretName: bitbucket-cloud-creds
        #     secretKey: username
        #   app_password_secretRef:
        #     secretName: bitbucket-cloud-creds
        #     secretKey: app_password
        #   oauth2:                                     # OAuth2 client credentials
        #     client_id_secretRef:
        #       secretName: bitbucket-oauth2-creds
        #       secretKey: client_id
        #     client_secret_secretRef:
        #       secretName: bitbucket-oauth2-creds
        #       secretKey: client_secret
        #     token_url: "https://bitbucket.org/site/oauth2/access_token"
        # -- Actions to perform when events are received
        actions:
          - name: commit-status
            # -- Action type (commit_status, check_run, pr_comment, issue_comment, discussion_comment, label, deployment_status)
            type: commit_status
            # -- Enable or disable this SCM provider instance
            enabled: false
            when: ""
      - name: server
        # -- SCM variant (cloud or server)
        variant: server
        # -- Enable or disable this SCM provider instance
        enabled: false
        # -- API base URL for the SCM provider
        base_url: "https://bitbucket.company.example.com"
        # -- Authentication configuration (variant=server: token)
        # auth:
        #   secretRef:
        #     secretName: bitbucket-server-token
        #     secretKey: token
        # -- Actions to perform when events are received
        actions:
          - name: commit-status
            # -- Action type (commit_status, check_run, pr_comment, issue_comment, discussion_comment, label, deployment_status)
            type: commit_status
            # -- Enable or disable this SCM provider instance
            enabled: false
            when: ""

    # -- Azure DevOps SCM provider configuration
    azure_devops:
      - name: default
        # -- Enable or disable this SCM provider instance
        enabled: false
        # -- Build status context/genre identifier
        genre: "tekton-ci"
        # -- API base URL for Azure DevOps
        base_url: "https://dev.azure.com"
        # -- Skip TLS verification (not recommended for production)
        insecure_skip_verify: false
        # secretRef:
        #   secretName: azure-devops-token
        #   secretKey: token
        # -- Actions to perform when events are received
        actions:
          - name: commit-status
            # -- Action type (commit_status, check_run, pr_comment, issue_comment, discussion_comment, label, deployment_status)
            type: commit_status
            # -- Enable or disable this SCM provider instance
            enabled: false
            when: ""
          - name: label
            # -- Action type (commit_status, check_run, pr_comment, issue_comment, discussion_comment, label, deployment_status)
            type: label
            # -- Enable or disable this SCM provider instance
            enabled: false
            when: ""
            # -- Declarative label effect: add/remove lists, Go-templated against the event
            labels:
              add:
                - '{{ if eq .State "success" }}build-passed{{ else }}build-failed{{ end }}'
              remove:
                - '{{ if eq .State "success" }}build-failed{{ else }}build-passed{{ end }}'

    # -- Gitea SCM provider configuration
    gitea:
      - name: default
        # -- Enable or disable this SCM provider instance
        enabled: false
        # -- API base URL for the SCM provider
        base_url: "https://gitea.company.example.com"
        # -- Authentication configuration (PAT or OAuth2, mutually exclusive)
        # auth:
        #   secretRef:
        #     secretName: gitea-token
        #     secretKey: token
        #   oauth2:                               # OAuth2 client credentials
        #     client_id_secretRef:
        #       secretName: gitea-oauth2-creds
        #       secretKey: client_id
        #     client_secret_secretRef:
        #       secretName: gitea-oauth2-creds
        #       secretKey: client_secret
        #     token_url: "https://gitea.company.example.com/login/oauth/access_token"
        # -- Actions to perform when events are received
        actions:
          - name: commit-status
            # -- Action type (commit_status, check_run, pr_comment, issue_comment, discussion_comment, label, deployment_status)
            type: commit_status
            # -- Enable or disable this SCM provider instance
            enabled: false
            when: ""
          - name: pr-comment
            # -- Action type (commit_status, check_run, pr_comment, issue_comment, discussion_comment, label, deployment_status)
            type: pr_comment
            # -- Enable or disable this SCM provider instance
            enabled: false
            when: 'stateIn("success", "failure")'
            template: |
              ## Pipeline {{.State}}
              **Run:** {{.RunName}}
              **Commit:** {{.CommitSHA}}
              {{if .TargetURL}}[View Results]({{.TargetURL}}){{end}}
            # OR reference a ConfigMap:
            # templateRef:
            #   configmapName: my-templates
            #   configmapKey: pr-comment.tmpl
          - name: issue-comment
            # -- Action type (commit_status, check_run, pr_comment, issue_comment, discussion_comment, label, deployment_status)
            type: issue_comment
            # -- Enable or disable this SCM provider instance
            enabled: false
            when: 'stateIn("failure", "error")'
            template: |
              Pipeline {{.Context}} finished: **{{.State}}**
              {{if .TargetURL}}[Results]({{.TargetURL}}){{end}}
            # OR reference a ConfigMap:
            # templateRef:
            #   configmapName: my-templates
            #   configmapKey: issue-comment.tmpl
          - name: label
            # -- Action type (commit_status, check_run, pr_comment, issue_comment, discussion_comment, label, deployment_status)
            type: label
            # -- Enable or disable this SCM provider instance
            enabled: false
            when: ""
            # -- Declarative label effect: add/remove lists, Go-templated against the event
            labels:
              add:
                - '{{ if eq .State "success" }}ci:passed{{ else }}ci:failed{{ end }}'
              remove:
                - '{{ if eq .State "success" }}ci:failed{{ else }}ci:passed{{ end }}'

    # -- SourceHut SCM provider configuration
    sourcehut:
      - name: default
        # -- Enable or disable this SCM provider instance
        enabled: false
        # secretRef:
        #   secretName: sourcehut-token
        #   secretKey: token
        # -- Actions to perform when events are received
        actions:
          - name: commit-status
            # -- Action type (commit_status, check_run, pr_comment, issue_comment, discussion_comment, label, deployment_status)
            type: commit_status
            # -- Enable or disable this SCM provider instance
            enabled: false
            when: ""

  # ==========================================================================
  # NOTIFIERS - CHAT & ALERTING
  # ==========================================================================
  # Notifiers send pipeline events to external chat/alerting systems.
  # Each notifier supports: name, enabled, when (CEL), template (Go template).
  #
  # NOTE on secrets in Helm context:
  #   Use Helm template syntax (e.g., {{ .Values.secrets.slackWebhookUrl }}) for
  #   values injected at deploy time. Runtime env var expansion (${ENV_VAR}) is
  #   used when the binary reads the config at startup.
  #   In this values.yaml, we use ${ENV_VAR} syntax because the config is rendered
  #   into a ConfigMap and expanded at runtime by the application.
  notifiers:
    # -------------------------------------------------------------------------
    # Slack
    # -------------------------------------------------------------------------
    # -- Slack notification channels configuration. Supports multiple channels with independent webhook secrets and templates.
    slack:
      # -- Unique identifier for this Slack channel configuration
      - name: main-channel
        # -- Enable or disable this Slack notifier instance
        enabled: false
        # Webhook mode:
        # secretRef:
        #   secretName: slack-webhook
        #   secretKey: webhook_url
        # Bot token mode:
        # secretRef:
        #   secretName: slack-bot-token
        #   secretKey: token
        # bot_token:
        #   channel_id: "C12345"
        # -- Slack channel to post notifications (e.g., #ci-notifications, @username)
        channel: "#ci-notifications"
        # -- Display name for the bot posting messages
        username: "Tekton CI"
        # -- Emoji icon for the bot (e.g., :robot_face:, :warning:)
        icon_emoji: ":robot_face:"
        # -- CEL expression to filter which events trigger notifications
        when: 'event.State == "failure" || event.State == "error"'
        # -- Go template for the Slack message body. Available variables: .State, .RunName, .CommitSHA, .TargetURL
        template: |
          :warning: *Pipeline {{.State}}*
          *Run:* `{{.RunName}}`
          *Commit:* `{{.CommitSHA}}`
          {{if .TargetURL}}<{{.TargetURL}}|View in Dashboard>{{end}}

    # -------------------------------------------------------------------------
    # Microsoft Teams
    # -------------------------------------------------------------------------
    # -- Microsoft Teams notification channels configuration. Supports multiple channels with independent webhook secrets and templates.
    teams:
      # -- Unique identifier for this Teams channel configuration
      - name: main-channel
        # -- Enable or disable this Teams notifier instance
        enabled: false
        # secretRef:
        #   secretName: teams-webhook
        #   secretKey: webhook_url
        # -- CEL expression to filter which events trigger notifications
        when: 'event.State == "success" || event.State == "failure" || event.State == "error"'
        # -- Go template for the Teams message body. Available variables: .State, .RunName, .Namespace, .CommitSHA, .TargetURL
        template: |
          **Pipeline {{.State}}**
          | Field | Value |
          |-------|-------|
          | Run | {{.RunName}} |
          | Namespace | {{.Namespace}} |
          | Commit | {{.CommitSHA}} |
          {{if .TargetURL}}[View in Dashboard]({{.TargetURL}}){{end}}

    # -------------------------------------------------------------------------
    # Discord
    # -------------------------------------------------------------------------
    # -- Discord notification channels configuration. Supports multiple channels with independent webhook secrets and templates.
    discord:
      # -- Unique identifier for this Discord channel configuration
      - name: main-channel
        # -- Enable or disable this Discord notifier instance
        enabled: false
        # Webhook mode:
        # secretRef:
        #   secretName: discord-webhook
        #   secretKey: webhook_url
        # Bot token mode:
        # secretRef:
        #   secretName: discord-bot-token
        #   secretKey: token
        # bot_token:
        #   channel_id: "123456789012345678"
        # -- Display name for the bot posting messages
        username: "Tekton CI"
        # -- CEL expression to filter which events trigger notifications
        when: 'event.Namespace == "staging" || event.Namespace == "production"'
        # -- Go template for the Discord message body. Available variables: .State, .RunName, .Namespace, .CommitSHA, .TargetURL
        template: |
          **Pipeline {{.State}}** in `{{.Namespace}}`
          ```
          Run:    {{.RunName}}
          Commit: {{.CommitSHA}}
          ```
          {{if .TargetURL}}[View in Dashboard]({{.TargetURL}}){{end}}

    # -------------------------------------------------------------------------
    # PagerDuty
    # -------------------------------------------------------------------------
    # -- PagerDuty incident services configuration. Supports multiple services with independent integration keys.
    pagerduty:
      # -- Unique identifier for this PagerDuty service configuration
      - name: main-service
        # -- Enable or disable this PagerDuty notifier instance
        enabled: false
        # secretRef:
        #   secretName: pagerduty-integration-key
        #   secretKey: integration_key
        # -- Incident severity level (critical, error, warning, info)
        severity: "critical"
        # -- CEL expression to filter which events trigger incidents
        when: 'event.State == "failure" || event.State == "error"'

    # -------------------------------------------------------------------------
    # Datadog
    # -------------------------------------------------------------------------
    # -- Datadog event tracking configuration. Supports multiple instances with independent API keys and sites.
    datadog:
      # -- Unique identifier for this Datadog instance configuration
      - name: main-instance
        # -- Enable or disable this Datadog notifier instance
        enabled: false
        # secretRef:
        #   secretName: datadog-api-key
        #   secretKey: api_key
        # -- Datadog site (datadoghq.com, datadoghq.eu, us3.datadoghq.com, etc.)
        site: "datadoghq.com"
        # Custom tags appended to auto-generated tags (state, context, namespace, etc.)
        # -- Custom tags appended to auto-generated tags (state, context, namespace are added automatically)
        tags:
          - "env:production"
          - "team:platform"
          - "service:tekton-events-relay"
        # -- CEL expression to filter which events are sent to Datadog
        when: 'event.State == "success" || event.State == "failure" || event.State == "error"'

    # -------------------------------------------------------------------------
    # Generic Webhook
    # -------------------------------------------------------------------------
    # -- Generic webhook endpoints configuration. Supports multiple webhooks with custom headers and payloads.
    webhook:
      # -- Unique identifier for this webhook configuration
      - name: main-webhook
        # -- Enable or disable this webhook notifier instance
        enabled: false
        # secretRef:
        #   secretName: custom-webhook
        #   secretKey: url
        # -- CEL expression to filter which events trigger webhook calls
        when: 'event.State == "success" || event.State == "failure" || event.State == "error"'
        # Custom HTTP headers for authentication and routing
        # -- Custom HTTP headers sent with the webhook request (e.g., authentication tokens, routing keys)
        headers:
          X-Source: "tekton-events-relay"

    # -------------------------------------------------------------------------
    # Grafana
    # -------------------------------------------------------------------------
    grafana:
      []
      # - name: deploy-markers
      #   enabled: false
      #   url: https://grafana.company.example.com
      #   secretRef:
      #     secretName: grafana-token
      #     secretKey: token
      #   templateRef:
      #     configmapName: grafana-templates
      #     configmapKey: deploy-marker.tmpl

    # -------------------------------------------------------------------------
    # Sentry
    # -------------------------------------------------------------------------
    sentry:
      []
      # - name: main
      #   enabled: false
      #   org: acme
      #   secretRef:
      #     secretName: sentry-token
      #     secretKey: token

    # -------------------------------------------------------------------------
    # Email (SMTP)
    # -------------------------------------------------------------------------
    # -- SMTP email notifier instances. The most universal channel: any relay
    # (corporate SMTP, SES, Mailgun, in-cluster Postfix) works.
    email:
      # -- Unique identifier for this email instance
      - name: default
        # -- Enable or disable this email notifier instance
        enabled: false
        # -- SMTP server hostname
        host: "smtp.example.com"
        # -- SMTP port (587 STARTTLS, 465 implicit TLS, 25 plain relays)
        port: 587
        # -- Connection security: starttls (default), tls or none.
        # NOTE: with "none", AUTH is only attempted against localhost relays.
        encryption: starttls
        # SMTP credentials. Omit auth entirely for unauthenticated relays.
        # Password comes from the mounted secret (key: password).
        # secretRef:
        #   secretName: email-default-credentials
        #   secretKey: password
        # username: ci@example.com
        # -- Sender address
        from: "tekton@example.com"
        # -- Recipient list
        to:
          - "platform-team@example.com"
        # -- Subject Go template (CR/LF stripped to prevent header injection)
        subject: "[tekton] {{ if .PipelineName }}{{ .PipelineName }}{{ else }}{{ .RunName }}{{ end }} — {{ .State }}"
        # -- Body Go template (omit for a readable plain-text default)
        # template: |
        #   Pipeline {{ .State }}: {{ .PipelineName }}
        # -- Send body as text/html instead of text/plain
        html: false
        # -- CEL expression to filter which events are emailed
        when: 'event.Resource == "pipelinerun" && stateIn("failure", "error")'

# Secret references use Tekton-style nested schema:
#   secretRef:
#     secretName: <kubernetes-secret-name>
#     secretKey: <key-within-secret>
#
# Template references use the same pattern:
#   templateRef:
#     configmapName: <kubernetes-configmap-name>
#     configmapKey: <key-within-configmap>
#
# Example: Create a secret for GitHub
#   kubectl create secret generic github-default-token --from-literal=token="ghp_xxx"
#
# Then in config.scm.github[0].auth:
#   secretRef:
#     secretName: github-default-token
#     secretKey: token
#
# The chart will automatically mount it at /etc/secrets/github/default/token
#
# Standard secretKey values by provider:
#   github, gitlab, azure_devops, gitea, sourcehut: token
#   bitbucket cloud: username, app_password
#   bitbucket server: token
#   slack, teams, discord: webhook_url (or token for bot mode)
#   pagerduty: integration_key
#   datadog: api_key
#   webhook: url
#   email: password
#   valkey: password

# Monitoring configuration
monitoring:
  # ServiceMonitor for Prometheus Operator
  serviceMonitor:
    enabled: false
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
    additionalLabels: {}
      # prometheus: kube-prometheus

# DNS configuration for pod
# ndots: Set ndots=2 to ensure DNS queries for service names (e.g., "service", "service.namespace")
# are resolved correctly without unnecessary parent domain searches. This optimizes DNS lookups
# for in-cluster services and reduces resolver query latency.
dnsPolicy: ClusterFirst
dnsConfig:
  options:
    - name: ndots
      value: "2"

# Network Policy configuration
# WARNING: Requires a CNI plugin that supports NetworkPolicy (e.g., Calico, Cilium, Weave).
# Enabling on a cluster without CNI support will block all pod-to-pod communication.
networkPolicy:
  enabled: true
  # -- Valkey port allowed for egress when config.store.backend=valkey
  valkeyPort: 6379
  # -- Metrics port opened for scraping when config.server.metrics_addr is set
  metricsPort: 9090
  # -- Restrict who may scrape metrics (empty = any source); standard `from` peers
  metricsFrom: []
  #  - namespaceSelector:
  #      matchLabels:
  #        kubernetes.io/metadata.name: monitoring
  # -- Additional ingress rules appended verbatim
  extraIngress: []
  # -- Additional egress rules appended verbatim (e.g. restrict 443 to SCM CIDRs)
  extraEgress: []
