<style>
  .layout{
    max-width:1380px; margin:0 auto; padding:0 28px;
    display:grid; grid-template-columns:248px minmax(0,1fr) 190px; gap:48px;
    align-items:start;
  }
  /* ---- sidebar ---- */
  .side{
    position:sticky; top:62px; max-height:calc(100vh - 62px);
    overflow-y:auto; padding:34px 0 60px;
    border-right:1px solid var(--line);
  }
  .side h3{
    font-family:var(--mono); font-size:11px; letter-spacing:.18em; text-transform:uppercase;
    color:var(--muted); margin:26px 0 10px; font-weight:500;
  }
  .side h3:first-child{margin-top:0;}
  .side ul{margin:0; padding:0; list-style:none; display:flex; flex-direction:column; gap:2px;}
  .side a{
    display:block; color:var(--body); font-size:14px; padding:5px 12px;
    border-radius:7px; border-left:2px solid transparent;
  }
  .side a:hover{color:var(--ink); background:var(--hover-bg); text-decoration:none;}
  .side a.active{
    color:var(--cyan-bright); background:rgba(70,226,234,.07);
    border-left-color:var(--cyan-bright); border-radius:0 7px 7px 0;
  }
  /* markdown-rendered sidebar (_Sidebar.md) */
  .side h1, .side h2, .side h4, .side h5, .side strong{
    font-family:var(--mono); font-size:11px; letter-spacing:.18em; text-transform:uppercase;
    color:var(--muted); margin:26px 0 10px; font-weight:500; display:block;
  }
  .side > *:first-child{margin-top:0;}
  .side ul ul{padding-left:14px; margin-top:2px;}
  .side p{margin:8px 0;}
  .side hr{border:none; border-top:1px solid var(--line); margin:18px 0;}
  .side strong a{
    font-family:var(--sans); font-size:14px; letter-spacing:0; text-transform:none;
    font-weight:600; color:var(--body);
  }
  .side strong a.active{color:var(--cyan-bright);}

  /* ---- article ---- */
  .doc{padding:40px 0 90px; min-height:70vh;}
  .doc h1{font-size:36px; letter-spacing:-.02em; color:var(--ink); margin:0 0 18px; line-height:1.15;}
  .doc h2{font-size:25px; letter-spacing:-.01em; color:var(--ink); margin:44px 0 14px; padding-top:18px; border-top:1px solid var(--line);}
  .doc h3{font-size:19px; color:var(--ink); margin:32px 0 10px;}
  .doc h4{font-size:16px; color:var(--ink); margin:26px 0 8px;}
  .doc p, .doc li{font-size:15.5px; line-height:1.7; color:var(--body);}
  .doc strong{color:var(--ink);}
  .doc hr{border:none; border-top:1px solid var(--line); margin:36px 0;}
  .doc blockquote{
    margin:20px 0; padding:14px 20px; border-left:3px solid var(--cyan);
    background:rgba(22,196,216,.06); border-radius:0 10px 10px 0;
  }
  .doc blockquote p{margin:0;}
  .doc code{
    font-family:var(--mono); font-size:13px; color:var(--inline-fg);
    background:var(--inline-bg); padding:1px 6px; border-radius:5px;
  }
  .doc pre{
    background:var(--code-bg); border:1px solid var(--code-border); border-radius:12px;
    padding:18px 20px; overflow-x:auto; margin:18px 0;
  }
  .doc pre code{background:none; padding:0; color:#c4d6e2; font-size:13px; line-height:1.65;}
  .doc table{border-collapse:collapse; width:100%; margin:20px 0; font-size:14px; display:block; overflow-x:auto;}
  .doc th{
    font-family:var(--mono); font-size:11.5px; letter-spacing:.08em; text-transform:uppercase;
    color:var(--muted); font-weight:500; text-align:left; padding:10px 14px;
    background:var(--bg-deep); border-bottom:1px solid var(--line);
  }
  .doc td{padding:9px 14px; border-bottom:1px solid var(--line-soft);}
  .doc img{max-width:100%; border-radius:10px;}
  .doc .mermaid{
    background:var(--code-bg); border:1px solid var(--code-border); border-radius:12px;
    padding:22px; margin:18px 0; display:flex; justify-content:center;
  }
  .doc-footer{
    margin-top:54px; padding-top:20px; border-top:1px solid var(--line);
    display:flex; justify-content:space-between; font-size:13.5px; color:var(--muted);
  }
  .doc-footer a{color:var(--muted);}
  .doc-footer a:hover{color:var(--cyan-bright);}

  /* ---- search (in top nav) ---- */
  .search{position:relative; width:230px; min-width:0;}
  .search input{
    width:100%; font-family:var(--sans); font-size:13.5px; color:var(--ink);
    background:var(--hover-bg); border:1px solid var(--line); border-radius:8px;
    padding:7px 12px; outline:none;
  }
  .search input:focus{border-color:rgba(70,226,234,.5);}
  .search input::placeholder{color:var(--muted);}
  .search kbd{
    position:absolute; right:9px; top:50%; transform:translateY(-50%);
    font-family:var(--mono); font-size:10.5px; color:var(--muted);
    border:1px solid var(--line); border-radius:5px; padding:1px 6px; pointer-events:none;
  }
  .search input:focus + kbd{display:none;}
  .search-results{
    position:absolute; top:calc(100% + 10px); right:0; width:360px; z-index:60;
    background:var(--panel); border:1px solid var(--line); border-radius:12px;
    box-shadow:0 18px 50px -12px rgba(0,0,0,.5); max-height:62vh; overflow-y:auto; padding:6px;
  }
  .sr-item{display:block; padding:9px 12px; border-radius:8px;}
  .sr-item:hover{background:var(--hover-bg); text-decoration:none;}
  .sr-item .sr-t{display:block; color:var(--ink); font-size:13.5px; font-weight:600;}
  .sr-item .sr-s{display:block; color:var(--muted); font-size:12px; line-height:1.5; margin-top:2px;}
  .sr-item mark{background:rgba(70,226,234,.25); color:var(--cyan-bright); border-radius:3px; padding:0 1px;}
  .sr-empty{padding:10px 12px; font-size:12.5px; color:var(--muted);}

  /* ---- floating toc ---- */
  .toc{
    position:sticky; top:62px; max-height:calc(100vh - 62px); overflow-y:auto;
    padding:46px 0 60px; font-size:12.5px;
  }
  .toc-title{
    font-family:var(--mono); font-size:10.5px; letter-spacing:.18em; text-transform:uppercase;
    color:var(--muted); margin:0 0 10px;
  }
  .toc a{
    display:block; color:var(--muted); padding:3px 0 3px 12px;
    border-left:2px solid var(--line); line-height:1.45;
  }
  .toc a:hover{color:var(--ink); text-decoration:none;}
  .toc a.t-h3{padding-left:24px;}
  .toc a.active{color:var(--cyan-bright); border-left-color:var(--cyan-bright);}

  /* ---- prev / next ---- */
  .pn{display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:48px;}
  .pn a{
    border:1px solid var(--line); border-radius:12px; padding:13px 18px;
    display:flex; flex-direction:column; gap:3px;
  }
  .pn a:hover{border-color:rgba(70,226,234,.4); text-decoration:none;}
  .pn .lbl{font-family:var(--mono); font-size:10.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted);}
  .pn .ttl{color:var(--ink); font-weight:600; font-size:15px;}
  .pn a.next{text-align:right; align-items:flex-end; grid-column:2;}

  /* missing page notice */
  .missing{
    border:1px dashed rgba(70,226,234,.35); border-radius:14px;
    padding:30px 34px; margin-top:26px; background:rgba(70,226,234,.04);
  }
  .missing h2{border:none; margin:0 0 10px; padding:0; font-size:20px;}
  .missing p{margin:0 0 10px; font-size:15px;}
  .missing code{font-family:var(--mono); font-size:12.5px; color:var(--inline-fg); background:var(--inline-bg); padding:1px 6px; border-radius:5px;}

  @media (max-width: 1200px){
    .layout{max-width:1240px; grid-template-columns:248px minmax(0,1fr); gap:56px;}
    .toc{display:none;}
  }
  @media (max-width: 860px){
    .layout{grid-template-columns:1fr; gap:0;}
    .side{position:static; max-height:none; border-right:none; border-bottom:1px solid var(--line); padding:24px 0;}
    .search{width:150px;}
    .search kbd{display:none;}
    .search-results{width:min(360px, calc(100vw - 40px));}
  }
</style>

<script>
const NAV = [
  {section:'Overview', pages:[['Home','Home']]},
  {section:'Getting started', pages:[
    ['Quickstart','Quickstart'],
    ['Installation','Installation'],
    ['Annotations','Annotations'],
  ]},
  {section:'Reference', pages:[
    ['Configuration','Configuration-Reference'],
    ['Actions','Actions'],
    ['CEL Expressions','CEL-Expressions'],
    ['Templates','Templates'],
  ]},
  {section:'SCM providers', pages:[
    ['GitHub','SCM-GitHub'],
    ['GitLab','SCM-GitLab'],
    ['Gitea','SCM-Gitea'],
    ['Bitbucket','SCM-Bitbucket'],
    ['Azure DevOps','SCM-Azure-DevOps'],
    ['SourceHut','SCM-SourceHut'],
  ]},
  {section:'Notifiers', pages:[['All notifiers','Notifiers']]},
  {section:'Production', pages:[
    ['Operations','Operations'],
    ['Observability','Observability'],
    ['Architecture','Architecture'],
    ['Troubleshooting','Troubleshooting'],
  ]},
  {section:'More', pages:[
    ['Examples','Examples'],
    ['Release Flow','Contributing-Release-Flow'],
  ]},
];

const WIKI_URL = 'https://github.com/fabioluciano/tekton-events-relay/wiki';
const WIKI_RAW = 'https://raw.githubusercontent.com/wiki/fabioluciano/tekton-events-relay/';
const params = new URLSearchParams(location.search);
const slug = params.get('page') || 'Home';

// ---- sidebar: prefer the wiki's _Sidebar.md, fall back to the static list ----
const sb = document.getElementById('sidebar');
let PAGES = []; // [{slug, title}] in sidebar order

async function fetchMd(s){
  for (const url of ['wiki/' + s + '.md', WIKI_RAW + s + '.md']) {
    try {
      const res = await fetch(url);
      if (res.ok) return await res.text();
    } catch (e) { /* try next source */ }
  }
  return null;
}

function collectPages(){
  PAGES = [];
  const seen = new Set();
  sb.querySelectorAll('a[href]').forEach(a => {
    try {
      const u = new URL(a.getAttribute('href'), location.href);
      if (!u.pathname.endsWith('docs.html')) return;
      const s = u.searchParams.get('page');
      if (s && !seen.has(s)) { seen.add(s); PAGES.push({slug:s, title:a.textContent.trim()}); }
    } catch (e) {}
  });
}

function staticSidebar(){
  sb.innerHTML = NAV.map(g =>
    '<h3>' + g.section + '</h3><ul>' +
    g.pages.map(([t, s]) =>
      '<li><a class="' + (s === slug ? 'active' : '') + '" href="docs.html?page=' + s + '">' + t + '</a></li>'
    ).join('') + '</ul>'
  ).join('');
}

async function buildSidebar(){
  let md = null;
  for (const url of ['wiki/_Sidebar.md', WIKI_RAW + '_Sidebar.md']) {
    try {
      const res = await fetch(url);
      if (res.ok) { md = await res.text(); break; }
    } catch (e) { /* try next source */ }
  }
  if (!md) { staticSidebar(); collectPages(); return; }
  // [[Title|Page]] and [[Page]] wikilinks -> regular links
  md = md
    .replace(/\[\[([^\]|]+)\|([^\]]+)\]\]/g, (m, t, p) => '[' + t + '](docs.html?page=' + encodeURIComponent(p.trim().replace(/ /g, '-')) + ')')
    .replace(/\[\[([^\]]+)\]\]/g, (m, p) => '[' + p + '](docs.html?page=' + encodeURIComponent(p.trim().replace(/ /g, '-')) + ')');
  sb.innerHTML = marked.parse(md);
  rewriteLinks(sb);
  // highlight current page
  sb.querySelectorAll('a[href]').forEach(a => {
    try {
      const u = new URL(a.getAttribute('href'), location.href);
      if ((u.searchParams.get('page') || 'Home') === slug && u.pathname.endsWith('docs.html')) a.classList.add('active');
    } catch (e) {}
  });
  collectPages();
}

// ---- markdown rendering ----
mermaid.initialize({startOnLoad:false, theme:'dark', themeVariables:{
  primaryColor:'#0E2236', primaryTextColor:'#EAF6F8', primaryBorderColor:'#16C4D8',
  lineColor:'#46E2EA', secondaryColor:'#102941', tertiaryColor:'#081320',
  fontFamily:'Space Grotesk, sans-serif',
}});

function rewriteLinks(root){
  root.querySelectorAll('a[href]').forEach(a => {
    const href = a.getAttribute('href');
    // wiki links -> internal docs links
    const m = href.match(/^https:\/\/github\.com\/fabioluciano\/tekton-events-relay\/wiki(?:\/([^#?]+))?(#.*)?$/);
    if (m) {
      a.setAttribute('href', 'docs.html?page=' + (m[1] || 'Home') + (m[2] || ''));
    } else if (/^https?:\/\//.test(href)) {
      a.setAttribute('target', '_blank');
      a.setAttribute('rel', 'noopener');
    } else if (!/^(docs\.html|index\.html|#|\?)/.test(href)) {
      // bare wiki-style relative link (e.g. "Quickstart")
      a.setAttribute('href', 'docs.html?page=' + href.replace(/\.md$/,''));
    }
  });
}

async function load(){
  const doc = document.getElementById('doc');
  const md = await fetchMd(slug);
  if (md === null) {
    document.title = slug.replace(/-/g,' ') + ' — Tekton Events Relay';
    doc.innerHTML =
      '<h1>' + slug.replace(/-/g,' ') + '</h1>' +
      '<div class="missing">' +
      '<h2>Couldn\'t load this page</h2>' +
      '<p>It wasn\'t found locally (<code>wiki/' + slug + '.md</code>) nor on the live wiki.</p>' +
      '<p>Check it on the <a href="' + WIKI_URL + '/' + slug + '" target="_blank" rel="noopener">GitHub wiki</a>.</p>' +
      '</div>';
    return;
  }

  marked.setOptions({gfm:true, breaks:false});
  doc.innerHTML = marked.parse(md);
  document.title = (doc.querySelector('h1')?.textContent || slug.replace(/-/g,' ')) + ' — Tekton Events Relay';

  rewriteLinks(doc);

  // GitHub-style heading ids (marked v12 doesn't generate them)
  const usedIds = new Set();
  doc.querySelectorAll('h1, h2, h3, h4').forEach(h => {
    if (h.id) return;
    let base = h.textContent.toLowerCase().trim()
      .replace(/[^\w\- ]+/g, '').replace(/\s+/g, '-') || 'section';
    let id = base, n = 1;
    while (usedIds.has(id)) id = base + '-' + (n++);
    usedIds.add(id);
    h.id = id;
  });
  buildToc();

  // mermaid blocks
  let mi = 0;
  doc.querySelectorAll('pre > code.language-mermaid').forEach(code => {
    const holder = document.createElement('div');
    holder.className = 'mermaid';
    holder.id = 'mmd-' + (mi++);
    holder.textContent = code.textContent;
    code.parentElement.replaceWith(holder);
  });
  if (mi > 0) mermaid.run({querySelector:'.mermaid'});

  // highlight everything else
  doc.querySelectorAll('pre code:not(.language-mermaid)').forEach(el => hljs.highlightElement(el));

  // footer
  const f = document.createElement('div');
  f.className = 'doc-footer';
  f.innerHTML =
    '<span><a href="' + WIKI_URL + '/' + slug + '/_edit" target="_blank" rel="noopener">Edit this page on the wiki</a></span>' +
    '<span><a href="#top" onclick="window.scrollTo({top:0,behavior:\'smooth\'});return false;">Back to top ↑</a></span>';
  doc.appendChild(f);

  // jump to hash now that ids exist
  if (location.hash) {
    const t = document.getElementById(decodeURIComponent(location.hash.slice(1)));
    if (t) window.scrollTo({top: t.getBoundingClientRect().top + window.scrollY - 80});
  }
}
// ---- floating table of contents + scroll spy ----
function buildToc(){
  const toc = document.getElementById('toc');
  const hs = [...document.querySelectorAll('.doc h2, .doc h3')];
  if (hs.length < 3) { toc.style.display = 'none'; return; }
  toc.innerHTML = '<p class="toc-title">On this page</p>' + hs.map(h =>
    '<a class="t-' + h.tagName.toLowerCase() + '" href="#' + h.id + '">' + h.textContent + '</a>'
  ).join('');
  const links = [...toc.querySelectorAll('a')];
  const targets = links.map(l => document.getElementById(decodeURIComponent(l.hash.slice(1)))).filter(Boolean);
  function spy(){
    if (!targets.length) return;
    let cur = targets[0];
    for (const h of targets) {
      if (h.getBoundingClientRect().top <= 110) cur = h; else break;
    }
    links.forEach(l => l.classList.toggle('active', decodeURIComponent(l.hash.slice(1)) === cur.id));
  }
  addEventListener('scroll', spy, {passive:true});
  spy();
}

// ---- prev / next ----
function buildPrevNext(){
  const i = PAGES.findIndex(p => p.slug === slug);
  if (i < 0) return;
  const prev = PAGES[i-1], next = PAGES[i+1];
  if (!prev && !next) return;
  const pn = document.createElement('nav');
  pn.className = 'pn';
  pn.innerHTML =
    (prev ? '<a class="prev" href="docs.html?page=' + prev.slug + '"><span class="lbl">← Previous</span><span class="ttl">' + prev.title + '</span></a>' : '<span></span>') +
    (next ? '<a class="next" href="docs.html?page=' + next.slug + '"><span class="lbl">Next →</span><span class="ttl">' + next.title + '</span></a>' : '');
  const f = document.querySelector('.doc-footer');
  if (f) f.before(pn); else document.getElementById('doc').appendChild(pn);
}

// ---- search ----
let SEARCH_INDEX = null;
async function ensureIndex(){
  if (SEARCH_INDEX) return SEARCH_INDEX;
  SEARCH_INDEX = await Promise.all(PAGES.map(async p => {
    const text = (await fetchMd(p.slug)) || '';
    return {slug:p.slug, title:p.title, text, lower:text.toLowerCase()};
  }));
  return SEARCH_INDEX;
}
function esc(s){return s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function snippet(text, q){
  const i = text.toLowerCase().indexOf(q);
  if (i < 0) return '';
  const start = Math.max(0, i - 55);
  let s = text.slice(start, i + q.length + 75).replace(/[#`*|>\[\]\n]+/g, ' ').trim();
  const ql = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'ig');
  return esc(s).replace(ql, '<mark>$1</mark>');
}
function initSearch(){
  const input = document.getElementById('searchInput');
  const panel = document.getElementById('searchResults');
  let tmr;
  input.addEventListener('focus', () => { ensureIndex(); });
  input.addEventListener('input', () => {
    clearTimeout(tmr);
    tmr = setTimeout(run, 160);
  });
  input.addEventListener('keydown', e => { if (e.key === 'Escape') { panel.hidden = true; input.blur(); } });
  document.addEventListener('keydown', e => {
    if (e.key === '/' && document.activeElement !== input && !/^(input|textarea)$/i.test(document.activeElement.tagName)) {
      e.preventDefault(); input.focus(); input.select();
    }
  });
  document.addEventListener('mousedown', e => {
    if (!panel.contains(e.target) && e.target !== input) panel.hidden = true;
  });
  async function run(){
    const q = input.value.trim().toLowerCase();
    if (q.length < 2) { panel.hidden = true; return; }
    const idx = await ensureIndex();
    const hits = idx
      .map(p => {
        let score = 0;
        if (p.title.toLowerCase().includes(q)) score += 100;
        const count = p.lower.split(q).length - 1;
        score += Math.min(count, 20) * 4;
        return {p, score};
      })
      .filter(h => h.score > 0)
      .sort((a, b) => b.score - a.score)
      .slice(0, 8);
    panel.innerHTML = hits.length
      ? hits.map(h =>
          '<a class="sr-item" href="docs.html?page=' + h.p.slug + '">' +
          '<span class="sr-t">' + esc(h.p.title) + '</span>' +
          (snippet(h.p.text, q) ? '<span class="sr-s">' + snippet(h.p.text, q) + '</span>' : '') +
          '</a>'
        ).join('')
      : '<div class="sr-empty">No results for “' + esc(input.value.trim()) + '”</div>';
    panel.hidden = false;
  }
}

// ---- boot ----
(async function(){
  await Promise.all([buildSidebar(), load()]);
  buildPrevNext();
  initSearch();
})();

function terToggleTheme(){
  var h=document.documentElement;
  var t=h.getAttribute('data-theme')==='light'?'dark':'light';
  h.setAttribute('data-theme',t);
  try{localStorage.setItem('ter-theme',t)}catch(e){}
}
</script>
